<style>

/* ── HELPERS ─────────────────────────────────────────────── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function today(){return new Date().toISOString().split('T')[0]}
function daysFrom(d){const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.ceil((x-t)/86400000)}
function fmtD(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtDLong(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function fmtSec(s){if(!s&&s!==0)return '—';return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}
function taskSort(a,b){
  const aD=a.due_date?daysFrom(a.due_date):999,bD=b.due_date?daysFrom(b.due_date):999;
  if((aD<0)!==(bD<0))return aD<0?-1:1;
  if((a.priority||2)!==(b.priority||2))return (a.priority||2)-(b.priority||2);
  return aD-bD;
}
function dueTag(t){
  if(!t.due_date)return null;
  const d=daysFrom(t.due_date);
  if(d<0)return{tx:`${Math.abs(d)}d overdue`,c:T.r,bg:T.rS};
  if(d===0)return{tx:'Today',c:T.w,bg:T.wS};
  if(d===1)return{tx:'Tomorrow',c:T.w,bg:T.wS};
  return{tx:fmtD(t.due_date),c:T.txS,bg:'transparent'};
}
const CHIP_PAL=[
  {bg:'#EEF0FD',c:'#3B4FD8'},{bg:'#FFF7ED',c:'#C2410C'},
  {bg:'#F0FDF4',c:'#15803D'},{bg:'#FDF2F8',c:'#BE185D'},
  {bg:'#F5F3FF',c:'#7C3AED'},{bg:'#FEF9C3',c:'#854D0E'},
  {bg:'#ECFDF5',c:'#059669'},{bg:'#E0F2FE',c:'#0369A1'},
];
const CHIP_MAP={home:CHIP_PAL[0],out:CHIP_PAL[1],anywhere:CHIP_PAL[2],work:CHIP_PAL[4]};
function chipStyle(s){
  if(CHIP_MAP[s])return CHIP_MAP[s];
  let h=0;for(const c of(s||''))h=(h*31+c.charCodeAt(0))>>>0;
  return CHIP_PAL[h%CHIP_PAL.length];
}

/* ── PERSISTENCE ─────────────────────────────────────────── */
function dStr(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0]}

/* ── RECURRENCE ──────────────────────────────────────────── */
const RECURRENCE_OPTS=[
  {v:null,l:'Once'},
  {v:'daily',l:'Daily'},
  {v:'weekly',l:'Weekly'},
  {v:'biweekly',l:'Every 2 weeks'},
  {v:'monthly',l:'Monthly'},
];
function nextRecurrence(date,kind){
  const d=date?new Date(date+'T12:00:00'):new Date();
  if(kind==='daily')d.setDate(d.getDate()+1);
  else if(kind==='weekly')d.setDate(d.getDate()+7);
  else if(kind==='biweekly')d.setDate(d.getDate()+14);
  else if(kind==='monthly')d.setMonth(d.getMonth()+1);
  else return null;
  return d.toISOString().split('T')[0];
}
function recurrenceLabel(k){return (RECURRENCE_OPTS.find(o=>o.v===k)||{}).l||'';}

/* ── NUDGES ──────────────────────────────────────────────── */
function buildNudges(state){
  const out=[];
  const {workouts,tasks,trips,checklist,books,clothing}=state;
  // No workout in N days
  const lastW=[...workouts].sort((a,b)=>b.date.localeCompare(a.date))[0];
  const daysSince=lastW?-daysFrom(lastW.date):999;
  if(daysSince>=5){
    out.push({id:'no_workout',tone:'warn',icon:'💤',title:`${daysSince} days since your last workout`,sub:'A short session today rebuilds the streak.',go:'fitness'});
  }
  // Upcoming trip with unbooked items
  const upcoming=[...trips].filter(t=>{const d=daysFrom(t.start_date);return d>=0&&d<=21;}).sort((a,b)=>a.start_date.localeCompare(b.start_date))[0];
  if(upcoming){
    const planChecks=checklist.filter(c=>c.trip_id===upcoming.id&&(c.kind||'packing')==='planning');
    const unbooked=planChecks.filter(c=>!c.completed);
    if(unbooked.length>0){
      out.push({id:'trip_booking',tone:'urgent',icon:'✈',title:`${upcoming.destination} in ${daysFrom(upcoming.start_date)}d`,sub:`${unbooked.length} booking item${unbooked.length>1?'s':''} unchecked — ${unbooked.slice(0,2).map(c=>c.title.toLowerCase()).join(', ')}`,go:'trips'});
    }
  }
  // Overdue tasks count
  const overdue=tasks.filter(t=>t.status==='todo'&&t.due_date&&daysFrom(t.due_date)<0).length;
  if(overdue>=3){
    out.push({id:'overdue',tone:'urgent',icon:'⏰',title:`${overdue} overdue tasks piling up`,sub:'A 15-minute triage now will pay off.',go:'tasks'});
  }
  // Currently reading nothing, books waiting
  const waiting=books.filter(b=>b.status==='to_read').length;
  const reading=books.find(b=>b.status==='reading');
  if(waiting>=3&&!reading){
    out.push({id:'pick_book',tone:'soft',icon:'▤',title:`${waiting} books waiting`,sub:'Pick one to start tonight.',go:'books'});
  }
  return out;
}

function loadState(){try{const r=localStorage.getItem('lifeos_v5');if(r){const p=JSON.parse(r);if(!p.user)p.user={age:22};p.user={age:22,sex:'female',abEvent:'plank',name:'',last_brief:null,last_close:null,...p.user};if(!p.inspoCategories)p.inspoCategories=['casual','workwear','evening','vacation'];if(!p.tags)p.tags=[];if(!p.reference)p.reference=[];p.inspo=(p.inspo||[]).map(i=>({categories:[],trip_id:null,tags:[],...i}));p.trips=(p.trips||[]).map(t=>({activity_ideas:t.notes||'',outfit_ideas:'',tag_id:null,...t}));p.tasks=(p.tasks||[]).map(t=>({recurrence:null,...t}));p.checklist=(p.checklist||[]).map(c=>({kind:'packing',...c}));return p;}}catch(e){}return JSON.parse(JSON.stringify(SEED));}
function saveState(s){try{localStorage.setItem('lifeos_v5',JSON.stringify(s));}catch(e){}}

/* ── UI PRIMITIVES ───────────────────────────────────────── */
function Card({children,onClick,style={},accent}){
  return <div onClick={onClick} style={{background:T.card,borderRadius:18,boxShadow:'0 1px 3px rgba(0,0,0,0.05),0 6px 20px rgba(0,0,0,0.04)',borderLeft:accent?`3px solid ${T.ac}`:undefined,cursor:onClick?'pointer':undefined,...style}}>{children}</div>;
}
function Btn({children,onClick,v='primary',size='md',full,disabled}){
  const base={display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,borderRadius:12,fontWeight:700,border:'none',cursor:disabled?'default':'pointer',fontFamily:'inherit',letterSpacing:'-0.01em',width:full?'100%':undefined,opacity:disabled?.5:1,fontSize:size==='sm'?13:14,padding:size==='sm'?'8px 16px':'11px 20px',minHeight:size==='sm'?36:44,transition:'opacity .1s'};
  const vs={primary:{background:T.ac,color:'#fff'},ghost:{background:T.acS,color:T.ac},soft:{background:T.bgS,color:T.txM},danger:{background:T.rS,color:T.r},dark:{background:T.tx,color:'#fff'}};
  return <button onClick={onClick} disabled={disabled} style={{...base,...vs[v]}}>{children}</button>;
}
function Inp({label,area,...props}){
  const [focus,setFocus]=useState(false);
  const style={width:'100%',minWidth:0,maxWidth:'100%',boxSizing:'border-box',background:T.bgS,border:`2px solid ${focus?T.ac:'transparent'}`,borderRadius:12,padding:'11px 14px',fontSize:15,color:T.tx,outline:'none',fontFamily:'inherit',transition:'border-color .15s',resize:area?'none':undefined};
  return <div style={{minWidth:0}}>{label&&<label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.txS,marginBottom:6}}>{label}</label>}{area?<textarea {...props} style={style} onFocus={e=>{setFocus(true);props.onFocus?.(e)}} onBlur={e=>{setFocus(false);props.onBlur?.(e)}} />:<input {...props} style={style} onFocus={e=>{setFocus(true);props.onFocus?.(e)}} onBlur={e=>{setFocus(false);props.onBlur?.(e)}} />}</div>;
}
function Sel({label,children,...props}){
  return <div>{label&&<label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.txS,marginBottom:6}}>{label}</label>}<select {...props} style={{width:'100%',boxSizing:'border-box',background:T.bgS,border:'2px solid transparent',borderRadius:12,padding:'11px 14px',fontSize:15,color:T.tx,outline:'none',fontFamily:'inherit'}}>{children}</select></div>;

function Check({on,onClick}){

    {on&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
  </button>;
}
function Bar({value,max,h=6,color}){
  const p=max>0?Math.min(100,(value/max)*100):0;
  return <div style={{width:'100%',height:h,background:T.bgS,borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${p}%`,background:color||T.ac,borderRadius:99,transition:'width .7s cubic-bezier(.4,0,.2,1)'}}/></div>;
}

    {action&&<button onClick={onAction} style={{fontSize:12,fontWeight:700,color:T.ac,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}}>{action}</button>}
  </div>;

function ScoreBar({label,raw,score}){

    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.tx} strokeWidth="2.5"><polyline points="15,18 9,12 15,6"/></svg>

function IconBtn({onClick,children,danger}){
  return <button onClick={onClick} style={{background:'none',border:'none',cursor:'pointer',padding:6,color:danger?T.r:T.txS,display:'flex',alignItems:'center'}}>{children}</button>;
}
const TrashIcon=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4h6v2"/></svg>;

/* ── TODAY ───────────────────────────────────────────────── */
function RitualSheet({kind,state,setState,onClose,go}){
  const {tasks,workouts,trips,checklist}=state;
  const isBrief=kind==='brief';
  function save(n){setState(n);saveState(n);}
  function dismiss(){
    save({...state,user:{...state.user,[isBrief?'last_brief':'last_close']:today()}});
    onClose();
  }

  if(isBrief){
    const todoToday=tasks.filter(t=>t.status==='todo'&&(t.project_id==null||t.pin_today)&&(t.due_date===today()||(t.due_date&&daysFrom(t.due_date)<0))).sort(taskSort);
    const noDue=tasks.filter(t=>t.status==='todo'&&t.project_id==null&&!t.due_date).slice(0,3);
    const todayW=workouts.find(w=>w.date===today());
    const upcoming=[...trips].filter(t=>{const d=daysFrom(t.start_date);return d>=0&&d<=21;}).sort((a,b)=>a.start_date.localeCompare(b.start_date));
    return <Sheet onClose={onClose}>
      <div style={{display:'flex',flexDirection:'column',gap:18}}>
        <div>
          <p style={{fontSize:11,fontWeight:800,letterSpacing:'0.14em',color:T.txS,textTransform:'uppercase'}}>Morning brief · {new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</p>
          <p style={{fontSize:24,fontWeight:400,fontFamily:T.serif,color:T.tx,marginTop:6,lineHeight:1.2}}>Here's your day.</p>
        </div>

        <div>
          <p style={{fontSize:11,fontWeight:800,letterSpacing:'0.1em',color:T.txS,textTransform:'uppercase',marginBottom:8}}>Due today & overdue ({todoToday.length})</p>
          {todoToday.length===0?<p style={{fontSize:13,color:T.txM}}>Nothing scheduled — pick something from the list.</p>:
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {todoToday.slice(0,5).map(t=>{const du=dueTag(t);return <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0'}}>
              <div style={{width:6,height:6,borderRadius:99,background:PC[t.priority||2]}}/>
              <span style={{flex:1,fontSize:14,color:T.tx}}>{t.title}</span>
              {du&&<span style={{fontSize:11,fontWeight:700,color:du.c}}>{du.tx}</span>}
            </div>;})}
          </div>}
        </div>

        {todayW?<div style={{background:T.gS,borderRadius:12,padding:'12px 14px'}}>
          <p style={{fontSize:13,fontWeight:700,color:'#15803D'}}>✓ Workout already logged · {todayW.duration_minutes}min</p>
        </div>:<div style={{background:T.bgS,borderRadius:12,padding:'12px 14px'}}>
          <p style={{fontSize:13,fontWeight:700,color:T.tx}}>Move today?</p>
          <p style={{fontSize:12,color:T.txM,marginTop:2}}>Log a session — even 15 minutes counts.</p>
        </div>}

        {upcoming.length>0&&<div>
          <p style={{fontSize:11,fontWeight:800,letterSpacing:'0.1em',color:T.txS,textTransform:'uppercase',marginBottom:6}}>On the horizon</p>
          {upcoming.slice(0,2).map(t=>{const planLeft=checklist.filter(c=>c.trip_id===t.id&&(c.kind||'packing')==='planning'&&!c.completed).length;return <div key={t.id} style={{padding:'8px 0',borderTop:`1px solid ${T.bgS}`,display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
            <span style={{fontSize:14,fontWeight:600,color:T.tx}}>{t.destination}</span>
            <span style={{fontSize:12,color:planLeft>0?T.r:T.txS,fontWeight:planLeft>0?700:500}}>{daysFrom(t.start_date)}d{planLeft>0?` · ${planLeft} unbooked`:''}</span>
          </div>;})}
        </div>}

        {noDue.length>0&&<div>
          <p style={{fontSize:11,fontWeight:800,letterSpacing:'0.1em',color:T.txS,textTransform:'uppercase',marginBottom:6}}>Pull from the backlog?</p>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {noDue.map(t=><button key={t.id} onClick={()=>{save({...state,tasks:state.tasks.map(x=>x.id===t.id?{...x,due_date:today()}:x)});}} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',background:T.bgS,borderRadius:10,border:'none',cursor:'pointer',fontFamily:'inherit',width:'100%',textAlign:'left'}}>
              <span style={{fontSize:11,fontWeight:700,color:T.ac,padding:'2px 6px',background:T.acS,borderRadius:6}}>+ Today</span>
              <span style={{flex:1,fontSize:13,color:T.tx}}>{t.title}</span>
            </button>)}
          </div>
        </div>}

        <Btn onClick={dismiss} full>Let's go →</Btn>
      </div>
    </Sheet>;
  }

  // Evening close
  const doneToday=tasks.filter(t=>t.completed_at===today());
  const remaining=tasks.filter(t=>t.status==='todo'&&t.project_id==null&&t.due_date===today()).length;
  const todayW=workouts.find(w=>w.date===today());
  const tomorrow=(()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];})();
  const tmrTasks=tasks.filter(t=>t.status==='todo'&&(t.project_id==null||t.pin_today)&&t.due_date===tomorrow);
  return <Sheet onClose={onClose}>
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div>
        <p style={{fontSize:11,fontWeight:800,letterSpacing:'0.14em',color:T.txS,textTransform:'uppercase'}}>Evening close · {new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</p>
        <p style={{fontSize:24,fontWeight:400,fontFamily:T.serif,color:T.tx,marginTop:6,lineHeight:1.2}}>How'd it go?</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
        <div style={{background:T.gS,borderRadius:12,padding:'14px 10px',textAlign:'center'}}>
          <p style={{fontSize:24,fontWeight:700,fontFamily:T.serif,color:'#15803D',lineHeight:1}}>{doneToday.length}</p>
          <p style={{fontSize:10,fontWeight:800,color:'#15803D',marginTop:4,letterSpacing:'0.08em',textTransform:'uppercase'}}>Done</p>
        </div>
        <div style={{background:remaining>0?T.wS:T.bgS,borderRadius:12,padding:'14px 10px',textAlign:'center'}}>
          <p style={{fontSize:24,fontWeight:700,fontFamily:T.serif,color:remaining>0?'#854D0E':T.txM,lineHeight:1}}>{remaining}</p>
          <p style={{fontSize:10,fontWeight:800,color:remaining>0?'#854D0E':T.txS,marginTop:4,letterSpacing:'0.08em',textTransform:'uppercase'}}>Left</p>
        </div>
        <div style={{background:todayW?T.acS:T.bgS,borderRadius:12,padding:'14px 10px',textAlign:'center'}}>
          <p style={{fontSize:20,fontWeight:700,fontFamily:T.serif,color:todayW?T.ac:T.txM,lineHeight:1.2}}>{todayW?'✓':'—'}</p>
          <p style={{fontSize:10,fontWeight:800,color:todayW?T.ac:T.txS,marginTop:4,letterSpacing:'0.08em',textTransform:'uppercase'}}>Workout</p>
        </div>
      </div>

      {doneToday.length>0&&<div>
        <p style={{fontSize:11,fontWeight:800,letterSpacing:'0.1em',color:T.txS,textTransform:'uppercase',marginBottom:6}}>What you got done</p>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {doneToday.slice(0,8).map(t=><div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0'}}>
            <span style={{color:T.g,fontSize:13}}>✓</span>
            <span style={{fontSize:13,color:T.txM,textDecoration:'line-through'}}>{t.title}</span>
          </div>)}
        </div>
      </div>}

      <div>
        <p style={{fontSize:11,fontWeight:800,letterSpacing:'0.1em',color:T.txS,textTransform:'uppercase',marginBottom:6}}>Tomorrow ({tmrTasks.length})</p>
        {tmrTasks.length===0?<button onClick={()=>{go('tasks');onClose();}} style={{fontSize:13,color:T.ac,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:0,fontWeight:600}}>Nothing planned. Add some tasks →</button>:
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {tmrTasks.slice(0,5).map(t=><div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0'}}>
            <div style={{width:6,height:6,borderRadius:99,background:PC[t.priority||2]}}/>
            <span style={{fontSize:13,color:T.tx}}>{t.title}</span>
          </div>)}
        </div>}
      </div>

      <Btn onClick={dismiss} full v="dark">Close the day</Btn>
    </div>
  </Sheet>;
}

/* ── TODAY ───────────────────────────────────────────────── */
function TodayView({state,setState,go}){
  const {tasks,workouts,workoutCats,trips,user}=state;
  const season=new Date().getMonth()<6?'pft':'cft';
  const testDate=season==='pft'?'2026-06-15':'2026-10-15';
  const days=daysFrom(testDate);
  const open=tasks.filter(t=>t.status==='todo'&&(t.project_id==null||t.pin_today)).sort(taskSort).slice(0,5);
  const todayW=workouts.find(w=>w.date===today());
  const streak=(()=>{const s=[...workouts].sort((a,b)=>b.date.localeCompare(a.date));let c=0,p=null;for(const w of s){if(!p){c=1;p=w.date;continue;}if(Math.round((new Date(p)-new Date(w.date))/86400000)===1){c++;p=w.date;}else break;}return c;})();
  const monthW=workouts.filter(w=>{const d=new Date(w.date),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).length;
  const nextTrip=[...trips].filter(t=>daysFrom(t.start_date)>=0).sort((a,b)=>a.start_date.localeCompare(b.start_date))[0];
  const nudges=buildNudges(state);
  const now=new Date();const h=now.getHours();
  const greeting=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  const greetingName=user.name?`${greeting}, ${user.name.split(' ')[0]}`:greeting;
  const catName=id=>workoutCats.find(c=>c.id===id)?.name||id;
  const catColor=id=>workoutCats.find(c=>c.id===id)?.color||T.ac;
  const [completing,setCompleting]=useState(new Set());
  const [ritual,setRitual]=useState(null);
  const briefToday=user.last_brief===today();
  const closeToday=user.last_close===today();
  const briefAvailable=h<14&&!briefToday;
  const closeAvailable=h>=17&&!closeToday;

  function complete(id){
    if(completing.has(id))return;
    if(navigator.vibrate)navigator.vibrate([30,20,50]);
    setCompleting(s=>new Set([...s,id]));
    setTimeout(()=>{
      setState(s=>{
        const task=s.tasks.find(t=>t.id===id);
        let newTasks=s.tasks.map(t=>t.id===id?{...t,status:'done',completed_at:today()}:t);
        if(task&&task.recurrence){
          const nextDue=nextRecurrence(task.due_date||today(),task.recurrence);
          newTasks=[{...task,id:uid(),status:'todo',due_date:nextDue,completed_at:null,pin_today:false},...newTasks];
        }
        const n={...s,tasks:newTasks};saveState(n);return n;
      });
      setCompleting(s=>{const n=new Set(s);n.delete(id);return n;});
    },600);
  }

  return <div style={{display:'flex',flexDirection:'column',gap:16}} className="slide-up">
    <div>
      <p style={{fontSize:12,fontWeight:500,color:T.txS,letterSpacing:'0.04em',marginBottom:4}}>{now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p>
      <h1 style={{fontSize:30,fontWeight:400,color:T.tx,fontFamily:T.serif,lineHeight:1.1}}>{greetingName}</h1>
    </div>

    {(briefAvailable||closeAvailable)&&<div style={{display:'flex',gap:8}}>
      {briefAvailable&&<button onClick={()=>setRitual('brief')} style={{flex:1,background:T.tx,color:'#fff',border:'none',borderRadius:14,padding:'12px 14px',display:'flex',alignItems:'center',gap:10,cursor:'pointer',fontFamily:'inherit',textAlign:'left'}}>
        <span style={{fontSize:20}}>☀</span>
        <div style={{flex:1}}>
          <p style={{fontSize:13,fontWeight:700}}>Start the day</p>
          <p style={{fontSize:11,opacity:.7,marginTop:1}}>2-min morning brief</p>
        </div>
      </button>}
      {closeAvailable&&<button onClick={()=>setRitual('close')} style={{flex:1,background:T.ac,color:'#fff',border:'none',borderRadius:14,padding:'12px 14px',display:'flex',alignItems:'center',gap:10,cursor:'pointer',fontFamily:'inherit',textAlign:'left'}}>
        <span style={{fontSize:20}}>☾</span>
        <div style={{flex:1}}>
          <p style={{fontSize:13,fontWeight:700}}>Close the day</p>
          <p style={{fontSize:11,opacity:.85,marginTop:1}}>Look back, plan tomorrow</p>
        </div>
      </button>}
    </div>}

    {nudges.length>0&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
      {nudges.map(n=>{
        const bg=n.tone==='urgent'?T.rS:n.tone==='warn'?T.wS:T.acS;
        const accent=n.tone==='urgent'?T.r:n.tone==='warn'?T.w:T.ac;
        const titleC=n.tone==='urgent'?'#991B1B':n.tone==='warn'?'#854D0E':T.tx;
        const subC=n.tone==='urgent'?'#B91C1C':n.tone==='warn'?'#A16207':T.txM;
        return <button key={n.id} onClick={()=>go(n.go)} style={{background:bg,borderLeft:`3px solid ${accent}`,borderRadius:14,padding:'12px 16px',cursor:'pointer',display:'flex',alignItems:'center',gap:12,border:'none',width:'100%',textAlign:'left',fontFamily:'inherit'}}>
          <span style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:13,fontWeight:700,color:titleC}}>{n.title}</p>
            <p style={{fontSize:12,color:subC,marginTop:2}}>{n.sub}</p>
          </div>
          <ChevRight/>
        </button>;
      })}
    </div>}

    <Card onClick={()=>go('fitness')} style={{padding:'14px 16px'}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:38,height:38,borderRadius:10,background:todayW?catColor(todayW.type)+'20':T.bgS,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>💪</div>
        <div style={{flex:1}}>
          {todayW?<><p style={{fontSize:14,fontWeight:600,color:T.tx}}>{catName(todayW.type)} · {todayW.duration_minutes}min ✓</p><p style={{fontSize:12,color:T.txS,marginTop:2}}>{monthW} workouts this month</p></>
          :<><p style={{fontSize:14,fontWeight:500,color:T.txM}}>No workout logged today</p><p style={{fontSize:12,color:T.txS,marginTop:2}}>{monthW} this month</p></>}
        </div>
        <ChevRight/>
      </div>
    </Card>

    <div>
      <SecLabel action="All →" onAction={()=>go('tasks')}>Today's Focus</SecLabel>
      {open.length===0?<p style={{fontSize:14,color:T.txS,textAlign:'center',padding:'28px 0'}}>All clear ✓</p>:
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {open.map(t=>{
            const du=dueTag(t);const isC=completing.has(t.id);
            return <div key={t.id} className={isC?'task-out':''} style={{background:T.card,borderRadius:14,padding:'12px 14px',borderLeft:`3px solid ${PC[t.priority||2]}`,boxShadow:'0 1px 3px rgba(0,0,0,0.04)',display:'flex',alignItems:'flex-start',gap:12}}>
              <div style={{paddingTop:1}}><Check on={isC} onClick={()=>complete(t.id)}/></div>
              <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>go('tasks')}>
                <p style={{fontSize:14,fontWeight:600,color:T.tx}}>{t.title}</p>
                <div style={{display:'flex',gap:6,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
                  <Chip label={t.context}/>
                  {t.recurrence&&<span style={{fontSize:11,fontWeight:700,color:T.txS,display:'inline-flex',alignItems:'center',gap:3}}>↻ {recurrenceLabel(t.recurrence).toLowerCase()}</span>}
                  {t.pin_today&&t.project_id&&<span style={{fontSize:10,fontWeight:700,color:T.ac}}>📌 from project</span>}
                  {du&&<span style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:6,color:du.c,background:du.bg}}>{du.tx}</span>}
                </div>
              </div>
            </div>;
          })}
        </div>}
    </div>

    {/* Compact stats row at bottom */}
    <div style={{display:'flex',gap:8,marginTop:4}}>
      <div onClick={()=>go('fitness')} style={{flex:1,background:T.bgS,borderRadius:14,padding:'12px 8px',textAlign:'center',cursor:'pointer'}}>
        <p style={{fontSize:22,fontWeight:700,fontFamily:T.serif,color:T.tx,lineHeight:1}}>{days}<span style={{fontSize:13,color:T.txS,fontWeight:600}}>d</span></p>
        <p style={{fontSize:9,fontWeight:800,letterSpacing:'0.1em',color:T.txS,marginTop:4,textTransform:'uppercase'}}>{season.toUpperCase()} Test</p>
      </div>
      <div onClick={()=>go('fitness')} style={{flex:1,background:streak>=3?'#FFF7ED':T.bgS,borderRadius:14,padding:'12px 8px',textAlign:'center',cursor:'pointer'}}>
        <p style={{fontSize:22,fontWeight:700,fontFamily:T.serif,color:streak>=3?'#EA580C':T.tx,lineHeight:1}}>{streak>=2?streak:monthW}{streak>=3?'🔥':''}</p>
        <p style={{fontSize:9,fontWeight:800,letterSpacing:'0.1em',color:streak>=3?'#B45309':T.txS,marginTop:4,textTransform:'uppercase'}}>{streak>=2?'Day streak':'Workouts'}</p>
      </div>
      {nextTrip?<div onClick={()=>go('trips')} style={{flex:1,background:T.bgS,borderRadius:14,padding:'12px 8px',textAlign:'center',cursor:'pointer',minWidth:0}}>
        <p style={{fontSize:22,fontWeight:700,fontFamily:T.serif,color:T.tx,lineHeight:1}}>{daysFrom(nextTrip.start_date)||'!'}<span style={{fontSize:13,color:T.txS,fontWeight:600}}>d</span></p>
        <p style={{fontSize:9,fontWeight:800,letterSpacing:'0.1em',color:T.txS,marginTop:4,textTransform:'uppercase',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{nextTrip.destination}</p>
      </div>:<div onClick={()=>go('trips')} style={{flex:1,background:T.bgS,borderRadius:14,padding:'12px 8px',textAlign:'center',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <p style={{fontSize:18,color:T.txS,lineHeight:1,fontWeight:300}}>+</p>
        <p style={{fontSize:9,fontWeight:800,letterSpacing:'0.1em',color:T.txS,marginTop:4,textTransform:'uppercase'}}>Add Trip</p>
      </div>}
    </div>

    {ritual&&<RitualSheet kind={ritual} state={state} setState={setState} onClose={()=>setRitual(null)} go={go}/>}
  </div>;
}

/* ── TASKS ───────────────────────────────────────────────── */
function TasksView({state,setState}){
  const {tasks,categories}=state;
  const [ctx,setCtx]=useState('all');
  const [title,setTitle]=useState('');
  const [context,setContext]=useState(categories[0]);
  const [priority,setPriority]=useState(2);
  const [due,setDue]=useState('');
  const [showOpts,setShowOpts]=useState(false);
  const [completing,setCompleting]=useState(new Set());
  const [editSheet,setEditSheet]=useState(null);
  const [showNewCat,setShowNewCat]=useState(false);
  const [newCat,setNewCat]=useState('');
  const [showDone,setShowDone]=useState(false);

  function save(n){setState(n);saveState(n);}
  function addTask(){
    if(!title.trim())return;
    const t={id:uid(),title:title.trim(),context,priority,due_date:due||null,status:'todo',project_id:null,recurrence:null};
    save({...state,tasks:[t,...state.tasks]});
    setTitle('');setDue('');setShowOpts(false);
  }
  function complete(id){
    if(completing.has(id))return;
    if(navigator.vibrate)navigator.vibrate([30,20,50]);
    setCompleting(s=>new Set([...s,id]));
    setTimeout(()=>{
      setState(s=>{
        const task=s.tasks.find(t=>t.id===id);
        let newTasks=s.tasks.map(t=>t.id===id?{...t,status:'done',completed_at:today()}:t);
        if(task&&task.recurrence){
          const nextDue=nextRecurrence(task.due_date||today(),task.recurrence);
          newTasks=[{...task,id:uid(),status:'todo',due_date:nextDue,completed_at:null,pin_today:false},...newTasks];
        }
        const n={...s,tasks:newTasks};saveState(n);return n;
      });
      setCompleting(s=>{const n=new Set(s);n.delete(id);return n;});
    },600);
  }
  function delTask(id){save({...state,tasks:state.tasks.filter(t=>t.id!==id)});setEditSheet(null);}
  function updateTask(id,fields){save({...state,tasks:state.tasks.map(t=>t.id===id?{...t,...fields}:t)});}
  function addCat(){const c=newCat.trim().toLowerCase();if(!c||categories.includes(c))return;save({...state,categories:[...categories,c]});setContext(c);setNewCat('');setShowNewCat(false);}

  const active=tasks.filter(t=>t.status==='todo'&&t.project_id==null&&(ctx==='all'||t.context===ctx)).sort(taskSort);
  const done=tasks.filter(t=>t.status==='done'&&t.project_id==null);

  return <div style={{display:'flex',flexDirection:'column',gap:16}} className="slide-up">
    <PageTitle>Tasks</PageTitle>

    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      <Pill label="All" count={tasks.filter(t=>t.status==='todo'&&t.project_id==null).length} active={ctx==='all'} onClick={()=>setCtx('all')}/>
      {categories.map(c=><Pill key={c} label={c} count={tasks.filter(t=>t.status==='todo'&&t.project_id==null&&t.context===c).length} active={ctx===c} onClick={()=>setCtx(c)}/>)}
      <Pill label="+ List" dashed onClick={()=>setShowNewCat(v=>!v)}/>
    </div>
    {showNewCat&&<div style={{display:'flex',gap:8}}>
      <input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCat()} placeholder="New list name…" autoFocus
        style={{flex:1,background:T.bgS,border:`2px solid ${T.ac}`,borderRadius:12,padding:'10px 14px',fontSize:15,color:T.tx,outline:'none',fontFamily:'inherit'}}/>
      <Btn onClick={addCat} size="sm">Add</Btn>

    <div style={{display:'flex',flexDirection:'column',gap:8}}>

              style={{fontSize:14,fontWeight:600,color:T.tx,background:'transparent',border:'none',outline:'none',width:'100%',fontFamily:'inherit',padding:0}}/>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:6,alignItems:'center'}}>
              <Chip label={t.context}/>
              {t.recurrence&&<span style={{fontSize:11,fontWeight:700,color:T.txS,display:'inline-flex',alignItems:'center',gap:3}}>↻ {recurrenceLabel(t.recurrence).toLowerCase()}</span>}
              {du&&<button onClick={()=>setEditSheet(t)} style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:6,color:du.c,background:du.bg,border:'none',cursor:'pointer',fontFamily:'inherit'}}>{du.tx}</button>}
              {!t.due_date&&<button onClick={()=>setEditSheet(t)} style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:6,color:T.txS,background:'transparent',border:`1px dashed ${T.border}`,cursor:'pointer',fontFamily:'inherit'}}>+ date</button>}
              <button onClick={()=>setEditSheet(t)} style={{fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:6,color:T.txS,background:'transparent',border:'none',cursor:'pointer',fontFamily:'inherit',marginLeft:'auto'}}>more…</button>
            </div>
          </div>
          <IconBtn onClick={()=>delTask(t.id)} danger><TrashIcon/></IconBtn>

    {done.length>0&&<div>
      <SecLabel action={showDone?'Hide':`Show (${done.length})`} onAction={()=>setShowDone(v=>!v)}>Completed</SecLabel>

        {done.slice(0,15).map(t=><div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',opacity:.4}}>

        </div>)}
      </div>}
    </div>}

    {editSheet&&<Sheet onClose={()=>setEditSheet(null)}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <p style={{fontSize:16,fontWeight:700,color:T.tx}}>Edit Task</p>
        <Inp label="Title" value={editSheet.title} onChange={e=>{const v=e.target.value;setEditSheet(s=>({...s,title:v}));updateTask(editSheet.id,{title:v});}}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Sel label="List" value={editSheet.context} onChange={e=>{const v=e.target.value;setEditSheet(s=>({...s,context:v}));updateTask(editSheet.id,{context:v});}}>
            {categories.map(c=><option key={c} value={c}>{c}</option>)}
          </Sel>
          <Sel label="Priority" value={editSheet.priority||2} onChange={e=>{const v=Number(e.target.value);setEditSheet(s=>({...s,priority:v}));updateTask(editSheet.id,{priority:v});}}>
            <option value={1}>🔴 Critical</option><option value={2}>🟡 Normal</option><option value={3}>⚪ Low</option>
          </Sel>
        </div>
        <Inp label="Due date" type="date" value={editSheet.due_date||''} onChange={e=>{const v=e.target.value||null;setEditSheet(s=>({...s,due_date:v}));updateTask(editSheet.id,{due_date:v});}}/>
        <Sel label="Repeats" value={editSheet.recurrence||''} onChange={e=>{const v=e.target.value||null;setEditSheet(s=>({...s,recurrence:v}));updateTask(editSheet.id,{recurrence:v});}}>
          {RECURRENCE_OPTS.map(o=><option key={o.v||'_'} value={o.v||''}>{o.l}</option>)}
        </Sel>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Btn v="soft" onClick={()=>setEditSheet(null)}>Done</Btn>
          <Btn v="danger" onClick={()=>delTask(editSheet.id)}>Delete</Btn>
        </div>
      </div>
    </Sheet>}
  </div>;
}

/* ── PROJECTS ────────────────────────────────────────────── */
function ProjectsView({state,setState}){
  const {projects,tasks}=state;
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({title:'',notes:''});
  const [taskIn,setTaskIn]=useState('');
  const [taskP,setTaskP]=useState(2);
  const [taskDue,setTaskDue]=useState('');
  function save(n){setState(n);saveState(n);}
  function addProject(){
    if(!form.title.trim())return;
    const p={id:uid(),title:form.title.trim(),notes:form.notes,updated_at:today(),status:'active'};
    save({...state,projects:[p,...state.projects]});
    setShowAdd(false);setForm({title:'',notes:''});
  }
  function updateProject(id,fields){save({...state,projects:state.projects.map(p=>p.id===id?{...p,...fields,updated_at:today()}:p)});}
  function delProject(id){save({...state,projects:state.projects.filter(p=>p.id!==id),tasks:state.tasks.filter(t=>t.project_id!==id)});setSel(null);}
  function addTask(){
    if(!taskIn.trim()||!sel)return;
    const t={id:uid(),title:taskIn.trim(),context:'anywhere',priority:taskP,due_date:taskDue||null,status:'todo',project_id:sel};
    save({...state,tasks:[...state.tasks,t]});setTaskIn('');setTaskDue('');
  }
  function completeTask(id){save({...state,tasks:state.tasks.map(t=>t.id===id?{...t,status:'done'}:t)});}
  function delTask(id){save({...state,tasks:state.tasks.filter(t=>t.id!==id)});}
  function updateProjTask(id,fields){save({...state,tasks:state.tasks.map(t=>t.id===id?{...t,...fields}:t)});}
  function togglePin(id){save({...state,tasks:state.tasks.map(t=>t.id===id?{...t,pin_today:!t.pin_today}:t)});}

  if(sel){
    const proj=projects.find(p=>p.id===sel);if(!proj)return null;
    const pt=tasks.filter(t=>t.project_id===proj.id).sort(taskSort);
    const todo=pt.filter(t=>t.status==='todo');const dn=pt.filter(t=>t.status==='done');
    return <div style={{display:'flex',flexDirection:'column',gap:16}} className="slide-up">
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <Back onClick={()=>setSel(null)}/>
        <input defaultValue={proj.title} onBlur={e=>updateProject(proj.id,{title:e.target.value})} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
          style={{flex:1,fontSize:22,fontWeight:700,color:T.tx,background:'transparent',border:'none',outline:'none',fontFamily:T.serif}}/>
        <IconBtn onClick={()=>delProject(proj.id)} danger><TrashIcon/></IconBtn>
      </div>
      {pt.length>0&&<div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:12,color:T.txS}}>{dn.length}/{pt.length} complete</span>
          <span style={{fontSize:12,fontWeight:700,color:T.ac}}>{Math.round(dn.length/pt.length*100)}%</span>
        </div>
        <Bar value={dn.length} max={pt.length} h={6}/>
      </div>}
      <Card style={{padding:'14px'}}>
        <SecLabel>Notes</SecLabel>
        <textarea defaultValue={proj.notes} onBlur={e=>updateProject(proj.id,{notes:e.target.value})} rows={4} placeholder="Add notes…"
          style={{width:'100%',boxSizing:'border-box',background:'transparent',border:'none',outline:'none',resize:'none',fontSize:14,color:T.txM,fontFamily:'inherit',lineHeight:1.6}}/>
      </Card>
      <div>
        <SecLabel>{todo.length} open task{todo.length!==1?'s':''}</SecLabel>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
          {todo.map(t=>{const du=dueTag(t);return <div key={t.id} style={{background:T.bgS,borderRadius:14,padding:'12px 14px',borderLeft:`3px solid ${PC[t.priority||2]}`,display:'flex',alignItems:'center',gap:12}}>
            <Check on={false} onClick={()=>completeTask(t.id)}/>
            <div style={{flex:1,minWidth:0}}>
              <input defaultValue={t.title} onBlur={e=>{const v=e.target.value.trim();if(v&&v!==t.title)updateProjTask(t.id,{title:v});else e.target.value=t.title;}} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
                style={{fontSize:14,fontWeight:600,color:T.tx,background:'transparent',border:'none',outline:'none',width:'100%',fontFamily:'inherit',padding:0}}/>
              <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4,flexWrap:'wrap'}}>
                {du&&<span style={{fontSize:11,fontWeight:700,color:du.c}}>{du.tx}</span>}
                <input type="date" defaultValue={t.due_date||''} onChange={e=>updateProjTask(t.id,{due_date:e.target.value||null})}
                  style={{fontSize:11,color:T.txS,background:'transparent',border:'none',outline:'none',fontFamily:'inherit',padding:0,cursor:'pointer'}}/>
              </div>
            </div>
            <button onClick={()=>togglePin(t.id)} title={t.pin_today?'Unpin from Today':'Pin to Today'}
              style={{background:t.pin_today?T.acS:'transparent',border:'none',cursor:'pointer',padding:6,borderRadius:8,color:t.pin_today?T.ac:T.txS,display:'flex',alignItems:'center',fontSize:14,lineHeight:1}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill={t.pin_today?'currentColor':'none'} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 17v5"/><path d="M9 10.76V6h6v4.76a2 2 0 0 0 .59 1.41L18 14H6l2.41-1.83A2 2 0 0 0 9 10.76z"/></svg>
            </button>
            <IconBtn onClick={()=>delTask(t.id)} danger><TrashIcon/></IconBtn>
          </div>;})}
          {dn.map(t=><div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',opacity:.35}}>
            <Check on={true} onClick={()=>{}}/><span style={{fontSize:14,textDecoration:'line-through',color:T.txM}}>{t.title}</span>
          </div>)}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <input value={taskIn} onChange={e=>setTaskIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()} placeholder="Add task…"
            style={{background:T.bgS,border:`2px solid ${T.border}`,borderRadius:12,padding:'10px 14px',fontSize:15,color:T.tx,outline:'none',fontFamily:'inherit',width:'100%',boxSizing:'border-box'}}/>
          <div style={{display:'flex',gap:8}}>
            <Sel value={taskP} onChange={e=>setTaskP(Number(e.target.value))} style={{flex:1}}>
              <option value={1}>🔴 Critical</option><option value={2}>🟡 Normal</option><option value={3}>⚪ Low</option>
            </Sel>
            <input type="date" value={taskDue} onChange={e=>setTaskDue(e.target.value)} style={{flex:1,background:T.bgS,border:'none',borderRadius:12,padding:'10px 10px',fontSize:13,color:T.tx,outline:'none',fontFamily:'inherit'}}/>
            <Btn onClick={addTask} size="sm">Add</Btn>
          </div>
        </div>
      </div>
    </div>;
  }

  return <div style={{display:'flex',flexDirection:'column',gap:16}} className="slide-up">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <PageTitle>Projects</PageTitle>
      <Btn onClick={()=>setShowAdd(v=>!v)} v="ghost" size="sm">+ New</Btn>
    </div>
    {showAdd&&<Card style={{padding:'16px'}}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Inp label="Title" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
        <Inp label="Notes" area rows={3} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
        <Btn onClick={addProject} full>Create Project</Btn>
      </div>
    </Card>}
    {projects.length===0&&<Empty icon="📁" text="No projects yet"/>}
    {projects.map(p=>{
      const all=tasks.filter(t=>t.project_id===p.id);
      const dn=all.filter(t=>t.status==='done');
      const urgent=all.filter(t=>t.status==='todo'&&t.due_date&&daysFrom(t.due_date)<=7).length;
      return <Card key={p.id} onClick={()=>setSel(p.id)} accent style={{padding:'16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <p style={{fontSize:17,fontWeight:700,color:T.tx,fontFamily:T.serif}}>{p.title}</p>
          {urgent>0&&<span style={{fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:8,background:T.wS,color:T.w}}>{urgent} due soon</span>}
        </div>
        {p.notes&&<p style={{fontSize:13,color:T.txM,marginTop:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.notes}</p>}
        {all.length>0&&<div style={{marginTop:12}}>
          <Bar value={dn.length} max={all.length} h={4}/>
          <p style={{fontSize:11,color:T.txS,marginTop:4}}>{dn.length}/{all.length} tasks</p>
        </div>}
      </Card>;
    })}
  </div>;
}

/* ── TRIPS ───────────────────────────────────────────────── */
function TripsView({state,setState}){
  const {trips,checklist}=state;
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({destination:'',start_date:'',end_date:''});
  const [tab,setTab]=useState('planning');
  const [checkIn,setCheckIn]=useState('');
  const [planIn,setPlanIn]=useState('');
  const [lightbox,setLightbox]=useState(null);
  const fileRef=useRef(null);
  const DEFAULT_PACKING=['Passport','Underwear','Toiletries','Make up','Jewelry','Kindle','Chargers'];
  const DEFAULT_PLANNING=['Flights booked','Accommodations booked'];
  function save(n){setState(n);saveState(n);}
  function addTrip(){
    if(!form.destination.trim())return;
    const tripId=uid();
    const t={id:tripId,...form,activity_ideas:'',outfit_ideas:'',outfit_photos:[]};
    const newChecks=[
      ...DEFAULT_PLANNING.map(title=>({id:uid(),trip_id:tripId,title,completed:false,kind:'planning'})),
      ...DEFAULT_PACKING.map(title=>({id:uid(),trip_id:tripId,title,completed:false,kind:'packing'})),
    ];
    save({...state,trips:[...state.trips,t].sort((a,b)=>a.start_date.localeCompare(b.start_date)),checklist:[...state.checklist,...newChecks]});
    setShowAdd(false);setForm({destination:'',start_date:'',end_date:''});
  }
  function updateTrip(id,fields){save({...state,trips:state.trips.map(t=>t.id===id?{...t,...fields}:t)});}
  function delTrip(id){save({...state,trips:state.trips.filter(t=>t.id!==id),checklist:state.checklist.filter(c=>c.trip_id!==id)});setSel(null);}
  function addCheck(kind){
    const txt=(kind==='planning'?planIn:checkIn).trim();
    if(!txt||!sel)return;
    const c={id:uid(),trip_id:sel,title:txt,completed:false,kind};
    save({...state,checklist:[...state.checklist,c]});
    if(kind==='planning')setPlanIn('');else setCheckIn('');
  }
  function toggleCheck(id){save({...state,checklist:state.checklist.map(c=>c.id===id?{...c,completed:!c.completed}:c)});}
  function delCheck(id){save({...state,checklist:state.checklist.filter(c=>c.id!==id)});}
  function updateCheck(id,fields){save({...state,checklist:state.checklist.map(c=>c.id===id?{...c,...fields}:c)});}

  function uploadOutfit(tripId,file){
    if(!file)return;
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const data=cv.toDataURL('image/jpeg',0.75);
      URL.revokeObjectURL(url);
      const item={id:uid(),photo:data,categories:['vacation'],trip_id:tripId};
      save({...state,inspo:[item,...state.inspo]});
    };img.src=url;
  }
  function delOutfit(tripId,photoId){save({...state,trips:state.trips.map(t=>t.id===tripId?{...t,outfit_photos:(t.outfit_photos||[]).filter(p=>p.id!==photoId)}:t)});}

  const sortedTrips=[...trips].sort((a,b)=>a.start_date.localeCompare(b.start_date));

  if(sel){
    const trip=trips.find(t=>t.id===sel);if(!trip)return null;
    const allChecks=checklist.filter(c=>c.trip_id===sel);
    const planChecks=allChecks.filter(c=>(c.kind||'packing')==='planning');
    const packChecks=allChecks.filter(c=>(c.kind||'packing')==='packing');
    const photos=trip.outfit_photos||[];
    const daysAway=daysFrom(trip.start_date);
    return <div style={{display:'flex',flexDirection:'column',gap:16}} className="slide-up">
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <Back onClick={()=>setSel(null)}/>
        <div style={{flex:1}}>
          <input defaultValue={trip.destination} onBlur={e=>updateTrip(trip.id,{destination:e.target.value})} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
            style={{fontSize:20,fontWeight:700,color:T.tx,background:'transparent',border:'none',outline:'none',fontFamily:T.serif,width:'100%'}}/>
          <p style={{fontSize:12,color:T.txS}}>{fmtDLong(trip.start_date)} – {fmtDLong(trip.end_date)} · {daysAway>0?`${daysAway}d away`:daysAway===0?'Today!':'Past'}</p>
        </div>
        <IconBtn onClick={()=>delTrip(trip.id)} danger><TrashIcon/></IconBtn>
      </div>
      <TabBar tabs={[['planning','Planning'],['packing','Packing'],['outfits','Outfits']]} active={tab} onChange={setTab}/>

      {tab==='planning'&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
        {/* Booking checklist */}
        <Card style={{padding:'14px 16px'}}>
          <SecLabel>Booking checklist</SecLabel>
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:10}}>
            {planChecks.length===0&&<p style={{fontSize:12,color:T.txS}}>No items yet.</p>}
            {planChecks.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'4px 0'}}>
              <Check on={c.completed} onClick={()=>toggleCheck(c.id)}/>
              <input defaultValue={c.title} onBlur={e=>{const v=e.target.value.trim();if(v&&v!==c.title)updateCheck(c.id,{title:v});else e.target.value=c.title;}} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
                style={{flex:1,fontSize:14,color:T.tx,background:'transparent',border:'none',outline:'none',fontFamily:'inherit',textDecoration:c.completed?'line-through':'none',opacity:c.completed?.5:1,padding:0}}/>
              <IconBtn onClick={()=>delCheck(c.id)}><TrashIcon/></IconBtn>
            </div>)}
          </div>
          <div style={{display:'flex',gap:8}}>
            <input value={planIn} onChange={e=>setPlanIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCheck('planning')} placeholder="Add booking item…"
              style={{flex:1,background:T.bgS,border:'2px solid transparent',borderRadius:10,padding:'9px 12px',fontSize:14,color:T.tx,outline:'none',fontFamily:'inherit'}}/>
            <Btn onClick={()=>addCheck('planning')} size="sm">Add</Btn>
          </div>
        </Card>

        {/* Dates */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Inp label="Start date" type="date" value={trip.start_date} onChange={e=>updateTrip(trip.id,{start_date:e.target.value})}/>
          <Inp label="End date" type="date" value={trip.end_date} onChange={e=>updateTrip(trip.id,{end_date:e.target.value})}/>
        </div>

        {/* Activity & Outfit ideas */}
        <Card style={{padding:'14px 16px'}}>
          <SecLabel>Activity ideas</SecLabel>
          <textarea defaultValue={trip.activity_ideas||''} onBlur={e=>updateTrip(trip.id,{activity_ideas:e.target.value})} rows={5} placeholder="Places to visit, restaurants, things to do…"
            style={{width:'100%',boxSizing:'border-box',background:'transparent',border:'none',outline:'none',resize:'none',fontSize:14,color:T.tx,fontFamily:'inherit',lineHeight:1.6}}/>
        </Card>
        <Card style={{padding:'14px 16px'}}>
          <SecLabel>Outfit ideas</SecLabel>
          <textarea defaultValue={trip.outfit_ideas||''} onBlur={e=>updateTrip(trip.id,{outfit_ideas:e.target.value})} rows={5} placeholder="What to wear for each day or event…"
            style={{width:'100%',boxSizing:'border-box',background:'transparent',border:'none',outline:'none',resize:'none',fontSize:14,color:T.tx,fontFamily:'inherit',lineHeight:1.6}}/>
        </Card>
      </div>}

      {tab==='packing'&&<div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
          {packChecks.length===0&&<Empty icon="🎒" text="No packing items yet"/>}
          {packChecks.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:T.card,borderRadius:12,boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
            <Check on={c.completed} onClick={()=>toggleCheck(c.id)}/>
            <input defaultValue={c.title} onBlur={e=>{const v=e.target.value.trim();if(v&&v!==c.title)updateCheck(c.id,{title:v});else e.target.value=c.title;}} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
              style={{flex:1,fontSize:14,color:T.tx,background:'transparent',border:'none',outline:'none',fontFamily:'inherit',textDecoration:c.completed?'line-through':'none',opacity:c.completed?.5:1,padding:0}}/>
            <IconBtn onClick={()=>delCheck(c.id)}><TrashIcon/></IconBtn>
          </div>)}
        </div>
        <div style={{display:'flex',gap:8}}>
          <input value={checkIn} onChange={e=>setCheckIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCheck('packing')} placeholder="Add item…"
            style={{flex:1,background:T.bgS,border:'2px solid transparent',borderRadius:12,padding:'10px 14px',fontSize:15,color:T.tx,outline:'none',fontFamily:'inherit'}}/>
          <Btn onClick={()=>addCheck('packing')} size="sm">Add</Btn>
        </div>
      </div>}

      {tab==='outfits'&&<div>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>{for(const f of e.target.files)uploadOutfit(trip.id,f);e.target.value='';}}/>
        <Btn onClick={()=>fileRef.current?.click()} full v="ghost" style={{marginBottom:8}}>📷 Add Outfit Photos</Btn>
        <p style={{fontSize:11,color:T.txS,marginBottom:14,lineHeight:1.5}}>Photos uploaded here are tagged to this trip and also live in <strong style={{color:T.txM,fontWeight:700}}>Style → Inspo</strong>.</p>
        {(()=>{
          const tripInspo=state.inspo.filter(i=>i.trip_id===trip.id);
          const all=[...tripInspo.map(i=>({src:i.data||i.photo,id:'i'+i.id,kind:'inspo'})),...photos.map(p=>({src:p.data,id:'l'+p.id,kind:'legacy',pid:p.id}))];
          if(all.length===0)return <Empty icon="👗" text="Upload outfit inspiration for this trip"/>;
          return <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
            {all.map(p=><div key={p.id} style={{position:'relative',aspectRatio:'3/4'}}>
              <img src={p.src} alt="" style={{width:'100%',height:'100%',borderRadius:8,display:'block',cursor:'pointer',objectFit:'cover'}} onClick={()=>setLightbox(p.src)}/>
              <button onClick={()=>{if(p.kind==='legacy')delOutfit(trip.id,p.pid);else save({...state,inspo:state.inspo.filter(i=>i.id!==p.id.slice(1))});}} style={{position:'absolute',top:4,right:4,background:'rgba(0,0,0,0.55)',border:'none',borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#fff',fontSize:12}}>×</button>
            </div>)}
          </div>;
        })()}
      </div>}

      {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.9)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
        <img src={lightbox} alt="" style={{maxWidth:'100%',maxHeight:'90vh',borderRadius:12,objectFit:'contain'}}/>
      </div>}
    </div>;
  }

  return <div style={{display:'flex',flexDirection:'column',gap:16}} className="slide-up">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <PageTitle>Trips</PageTitle>
      <Btn onClick={()=>setShowAdd(v=>!v)} v="ghost" size="sm">+ New</Btn>
    </div>
    {showAdd&&<Card style={{padding:'16px'}}><div style={{display:'flex',flexDirection:'column',gap:12}}>
      <Inp label="Destination" value={form.destination} onChange={e=>setForm({...form,destination:e.target.value})}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <Inp label="Start" type="date" value={form.start_date} onChange={e=>setForm({...form,start_date:e.target.value})}/>
        <Inp label="End" type="date" value={form.end_date} onChange={e=>setForm({...form,end_date:e.target.value})}/>
      </div>
      <p style={{fontSize:11,color:T.txS,lineHeight:1.5}}>Default packing list (passport, underwear, toiletries, make up, jewelry, kindle, chargers) and a booking checklist will be added automatically.</p>
      <Btn onClick={addTrip} full>Add Trip</Btn>
    </div></Card>}
    {sortedTrips.length===0&&<Empty icon="✈️" text="No trips planned"/>}
    {sortedTrips.map(trip=>{
      const daysAway=daysFrom(trip.start_date);
      const past=daysAway<0;
      const legacyPhotos=trip.outfit_photos||[];
      const tripInspo=state.inspo.filter(i=>i.trip_id===trip.id);
      const photos=[...tripInspo.map(i=>({id:'i'+i.id,data:i.photo})),...legacyPhotos];
      return <Card key={trip.id} onClick={()=>{setSel(trip.id);setTab('planning');}} style={{padding:'16px',opacity:past?.6:1}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div>
            <p style={{fontSize:17,fontWeight:700,color:T.tx,fontFamily:T.serif}}>{trip.destination}</p>
            <p style={{fontSize:12,color:T.txS,marginTop:2}}>{fmtD(trip.start_date)} – {fmtD(trip.end_date)}</p>
          </div>
          <span style={{fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:10,background:past?T.bgS:daysAway<=30?T.acS:T.bgS,color:past?T.txS:daysAway<=30?T.ac:T.txM,flexShrink:0}}>
            {past?'Past':daysAway===0?'Today!':daysAway===1?'Tomorrow':`${daysAway}d`}
          </span>
        </div>
        {photos.length>0&&<div style={{display:'flex',gap:4,marginTop:8}}>
          {photos.slice(0,4).map(p=><img key={p.id} src={p.data} alt="" style={{width:44,height:44,borderRadius:8,objectFit:'cover'}}/>)}
          {photos.length>4&&<div style={{width:44,height:44,borderRadius:8,background:T.bgS,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:T.txM}}>+{photos.length-4}</div>}
        </div>}
      </Card>;
    })}
  </div>;
}

/* ── STYLE (formerly Clothing) ───────────────────────────── */
function ClothingView({state,setState,initialTripFilter}){
  const {clothing,inspo,inspoCategories,trips}=state;
  const [tab,setTab]=useState('outfit_idea');
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({title:'',notes:'',price:'',photo:null});
  const [lightbox,setLightbox]=useState(null);
  const [editItem,setEditItem]=useState(null);
  const [editInspo,setEditInspo]=useState(null);
  const [inspoFilter,setInspoFilter]=useState(null);
  const [inspoTripFilter,setInspoTripFilter]=useState(initialTripFilter||null);
  const [showNewInspoCat,setShowNewInspoCat]=useState(false);
  const [newInspoCat,setNewInspoCat]=useState('');
  const fileRef=useRef(null);
  const inspoRef=useRef(null);
  function save(n){setState(n);saveState(n);}

  function compressImage(file,cb){
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=600;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);cb(cv.toDataURL('image/jpeg',0.72));
    };img.src=url;
  }

  function handlePhoto(file){if(!file)return;compressImage(file,data=>setForm(f=>({...f,photo:data})));}
  function addItem(){
    const item={id:uid(),type:tab,title:form.title.trim(),notes:form.notes,price:form.price||null,photo:form.photo,done:false};
    save({...state,clothing:[item,...state.clothing]});
    setShowAdd(false);setForm({title:'',notes:'',price:'',photo:null});
  }
  function delItem(id){save({...state,clothing:state.clothing.filter(c=>c.id!==id)});}
  function markDone(id){save({...state,clothing:state.clothing.map(c=>c.id===id?{...c,done:true}:c)});}
  function updateItem(id,fields){save({...state,clothing:state.clothing.map(c=>c.id===id?{...c,...fields}:c)});}

  function addInspo(file,tripId){
    if(!file)return;
    compressImage(file,data=>{
      const item={id:uid(),photo:data,categories:[],trip_id:tripId||null};
      save({...state,inspo:[item,...state.inspo]});
    });
  }
  function setInspoTrip(id,trip_id){save({...state,inspo:state.inspo.map(i=>i.id===id?{...i,trip_id}:i)});setEditInspo(s=>s?{...s,trip_id}:s);}
  function delInspo(id){save({...state,inspo:state.inspo.filter(i=>i.id!==id)});setEditInspo(null);}
  function toggleInspoCat(itemId,cat){save({...state,inspo:state.inspo.map(i=>{if(i.id!==itemId)return i;const cats=i.categories||[];return{...i,categories:cats.includes(cat)?cats.filter(c=>c!==cat):[...cats,cat]};})});setEditInspo(s=>s?{...s,categories:(s.categories||[]).includes(cat)?(s.categories||[]).filter(c=>c!==cat):[...(s.categories||[]),cat]}:s);}
  function addInspoCat(){const c=newInspoCat.trim().toLowerCase();if(!c||inspoCategories.includes(c))return;save({...state,inspoCategories:[...inspoCategories,c]});setNewInspoCat('');setShowNewInspoCat(false);}
  function delInspoCat(cat){save({...state,inspoCategories:inspoCategories.filter(c=>c!==cat),inspo:state.inspo.map(i=>({...i,categories:(i.categories||[]).filter(c=>c!==cat)}))});}

  const items=clothing.filter(c=>c.type===tab&&!c.done);
  let filteredInspo=inspo;
  if(inspoFilter)filteredInspo=filteredInspo.filter(i=>(i.categories||[]).includes(inspoFilter));
  if(inspoTripFilter)filteredInspo=filteredInspo.filter(i=>i.trip_id===inspoTripFilter);
  const supportsPhoto=tab==='outfit_idea'||tab==='want_to_buy';
  const upcomingTrips=[...trips].filter(t=>daysFrom(t.end_date)>=-30).sort((a,b)=>a.start_date.localeCompare(b.start_date));

  return <div style={{display:'flex',flexDirection:'column',gap:16}} className="slide-up">
    <PageTitle>Style</PageTitle>
    <TabBar tabs={[['outfit_idea','Outfits'],['want_to_buy','Wishlist'],['inspo','Inspo']]} active={tab} onChange={k=>{setTab(k);setShowAdd(false);}}/>

    {tab==='inspo'?<div>
      <input ref={inspoRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>{for(const f of e.target.files)addInspo(f);e.target.value='';}}/>
      <div style={{marginBottom:14}}><Btn onClick={()=>inspoRef.current?.click()} full v="ghost">📷 Upload Inspo Photos</Btn></div>

      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
        <Pill label="All" count={inspo.length} active={!inspoFilter} onClick={()=>setInspoFilter(null)}/>
        {inspoCategories.map(c=><Pill key={c} label={c} count={inspo.filter(i=>(i.categories||[]).includes(c)).length} active={inspoFilter===c} onClick={()=>setInspoFilter(inspoFilter===c?null:c)}/>)}
        <Pill label="+ Tag" dashed onClick={()=>setShowNewInspoCat(v=>!v)}/>
      </div>
      {upcomingTrips.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14,paddingTop:8,borderTop:`1px dashed ${T.border}`}}>
        <span style={{fontSize:10,fontWeight:800,color:T.txS,letterSpacing:'0.1em',textTransform:'uppercase',alignSelf:'center',marginRight:4}}>Trip</span>
        <Pill label="Any" active={!inspoTripFilter} onClick={()=>setInspoTripFilter(null)}/>
        {upcomingTrips.map(t=><Pill key={t.id} label={t.destination} count={inspo.filter(i=>i.trip_id===t.id).length} active={inspoTripFilter===t.id} onClick={()=>setInspoTripFilter(inspoTripFilter===t.id?null:t.id)}/>)}
      </div>}
      {showNewInspoCat&&<div style={{display:'flex',gap:8,marginBottom:14}}>
        <input value={newInspoCat} onChange={e=>setNewInspoCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addInspoCat()} placeholder="New tag name…" autoFocus
          style={{flex:1,background:T.bgS,border:`2px solid ${T.ac}`,borderRadius:12,padding:'10px 14px',fontSize:15,color:T.tx,outline:'none',fontFamily:'inherit'}}/>
        <Btn onClick={addInspoCat} size="sm">Add</Btn>
      </div>}

      {filteredInspo.length===0?<Empty icon="🌟" text={inspoFilter?`No inspo tagged "${inspoFilter}"`:'Upload outfit inspiration photos'}/>:
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
        {filteredInspo.map(item=><div key={item.id} onClick={()=>setEditInspo(item)} style={{position:'relative',aspectRatio:'3/4',cursor:'pointer'}}>
          <img src={item.photo} alt="" style={{width:'100%',height:'100%',borderRadius:8,display:'block',objectFit:'cover'}}/>
          {(item.categories||[]).length>0&&<div style={{position:'absolute',bottom:4,left:4,right:4,display:'flex',gap:2,flexWrap:'wrap'}}>
            {(item.categories||[]).slice(0,2).map(c=><span key={c} style={{fontSize:8,fontWeight:700,padding:'2px 5px',borderRadius:4,background:'rgba(0,0,0,0.6)',color:'#fff',textTransform:'capitalize'}}>{c}</span>)}
          </div>}
        </div>)}
      </div>}
    </div>:<>
      <Btn onClick={()=>setShowAdd(v=>!v)} full v="ghost">+ Add</Btn>
      {showAdd&&<Card style={{padding:'16px'}}><div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Inp label="Title" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
        <Inp label="Notes" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
        {tab==='want_to_buy'&&<Inp label="Est. price ($)" type="number" value={form.price} onChange={e=>setForm({...form,price:e.target.value})}/>}
        {supportsPhoto&&<div>
          <label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.txS,marginBottom:6}}>Photo</label>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handlePhoto(e.target.files[0])}/>
          {form.photo?<div style={{position:'relative'}}>
            <img src={form.photo} alt="" style={{width:'100%',borderRadius:12,maxHeight:200,objectFit:'cover'}}/>
            <button onClick={()=>setForm(f=>({...f,photo:null}))} style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,0.5)',border:'none',borderRadius:'50%',width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#fff'}}>×</button>
          </div>:<button onClick={()=>fileRef.current?.click()} style={{width:'100%',padding:'32px',borderRadius:12,background:T.bgS,border:`2px dashed ${T.border}`,cursor:'pointer',fontSize:13,color:T.txM,fontWeight:600,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
            <span style={{fontSize:24}}>📷</span>Tap to upload
          </button>}
        </div>}
        <Btn onClick={addItem} full>Save</Btn>
      </div></Card>}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {items.length===0&&<Empty icon="👗" text="Nothing here yet"/>}
        {items.map(item=>{
          return <Card key={item.id} style={{padding:'14px'}}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              {item.photo&&<img src={item.photo} alt="" onClick={()=>setLightbox(item.photo)} style={{width:60,height:60,borderRadius:10,objectFit:'cover',flexShrink:0,cursor:'pointer'}}/>}
              <div style={{flex:1,minWidth:0}}>
                <input defaultValue={item.title} onBlur={e=>updateItem(item.id,{title:e.target.value})} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
                  style={{fontSize:14,fontWeight:700,color:T.tx,background:'transparent',border:'none',outline:'none',width:'100%',fontFamily:'inherit'}}/>
                {item.notes&&<input defaultValue={item.notes} onBlur={e=>updateItem(item.id,{notes:e.target.value})} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
                  style={{fontSize:13,color:T.txM,background:'transparent',border:'none',outline:'none',width:'100%',fontFamily:'inherit',marginTop:2,padding:0}}/>}
                {item.price&&<p style={{fontSize:12,fontWeight:600,color:T.txS,marginTop:2}}>~${item.price}</p>}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
                <Btn onClick={()=>markDone(item.id)} v="ghost" size="sm">✓</Btn>
                <IconBtn onClick={()=>delItem(item.id)} danger><TrashIcon/></IconBtn>
              </div>
            </div>
          </Card>;
        })}
      </div>
    </>}

    {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.9)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <img src={lightbox} alt="" style={{maxWidth:'100%',maxHeight:'90vh',borderRadius:12,objectFit:'contain'}}/>
    </div>}

    {editInspo&&<Sheet onClose={()=>setEditInspo(null)}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <img src={editInspo.photo} alt="" style={{width:'100%',maxHeight:'45vh',objectFit:'contain',borderRadius:12,background:T.bgS}}/>
        <div>
          <SecLabel>Trip</SecLabel>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <Pill label="—" active={!editInspo.trip_id} onClick={()=>setInspoTrip(editInspo.id,null)}/>
            {upcomingTrips.map(t=><Pill key={t.id} label={t.destination} active={editInspo.trip_id===t.id} onClick={()=>setInspoTrip(editInspo.id,t.id)}/>)}
          </div>
        </div>
        <div>
          <SecLabel action={showNewInspoCat?'×':'+ New tag'} onAction={()=>setShowNewInspoCat(v=>!v)}>Tags</SecLabel>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {inspoCategories.map(c=>{const on=(editInspo.categories||[]).includes(c);return <Pill key={c} label={c} active={on} onClick={()=>toggleInspoCat(editInspo.id,c)}/>;})}
          </div>
          {showNewInspoCat&&<div style={{display:'flex',gap:8,marginTop:10}}>
            <input value={newInspoCat} onChange={e=>setNewInspoCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addInspoCat()} placeholder="New tag…" autoFocus
              style={{flex:1,background:T.bgS,border:`2px solid ${T.ac}`,borderRadius:12,padding:'10px 14px',fontSize:15,color:T.tx,outline:'none',fontFamily:'inherit'}}/>
            <Btn onClick={addInspoCat} size="sm">Add</Btn>
          </div>}
        </div>
        <Btn v="danger" onClick={()=>delInspo(editInspo.id)} full>Delete Photo</Btn>
      </div>
    </Sheet>}
  </div>;
}
