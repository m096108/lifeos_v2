function WorkoutsTab({state,save}){
  const {workouts,workoutCats}=state;
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({date:today(),type:workoutCats[0]?.id||'',duration_minutes:'',notes:''});
  const [editW,setEditW]=useState(null);
  const [showCatMgr,setShowCatMgr]=useState(false);
  const [newCat,setNewCat]=useState({name:'',color:'#22C55E'});
  const CAT_COLORS=['#22C55E','#8B5CF6','#F97316','#3B82F6','#EC4899','#14B8A6','#EAB308','#EF4444'];
  const now=new Date();
  const [calY,setCalY]=useState(now.getFullYear());
  const [calM,setCalM]=useState(now.getMonth()); // 0-indexed
  const [selectedDay,setSelectedDay]=useState(null);
  const catColor=id=>workoutCats.find(c=>c.id===id)?.color||T.ac;
  const catName=id=>workoutCats.find(c=>c.id===id)?.name||id;
  const streak=(()=>{const s=[...workouts].sort((a,b)=>b.date.localeCompare(a.date));let c=0,p=null;for(const w of s){if(!p){c=1;p=w.date;continue;}if(Math.round((new Date(p)-new Date(w.date))/86400000)===1){c++;p=w.date;}else break;}return c;})();
  const mo=workouts.filter(w=>{const d=new Date(w.date),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).length;
  function addWorkout(){
    if(!form.type||!form.duration_minutes)return;
    const w={id:uid(),...form,duration_minutes:Number(form.duration_minutes)};
    save({...state,workouts:[w,...state.workouts]});setShow(false);
  }
  function updateWorkout(id,fields){save({...state,workouts:state.workouts.map(w=>w.id===id?{...w,...fields}:w)});}
  function delWorkout(id){save({...state,workouts:state.workouts.filter(w=>w.id!==id)});setEditW(null);}
  function addCategory(){
    const name=newCat.name.trim();if(!name)return;
    const id=name.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20)+'_'+Math.random().toString(36).slice(2,5);
    save({...state,workoutCats:[...workoutCats,{id,name,color:newCat.color}]});
    setNewCat({name:'',color:CAT_COLORS[0]});
  }
  function delCategory(id){
    if(workouts.some(w=>w.type===id)){if(!window.confirm('This category has workouts logged. Delete anyway? (Workouts will keep this category id.)'))return;}
    save({...state,workoutCats:workoutCats.filter(c=>c.id!==id)});
  }
  function updateCategory(id,fields){save({...state,workoutCats:workoutCats.map(c=>c.id===id?{...c,...fields}:c)});}

  // Map date -> list of workouts (could be multiple per day)
  const dateMap={};
  workouts.forEach(w=>{if(!dateMap[w.date])dateMap[w.date]=[];dateMap[w.date].push(w);});

  // Build calendar grid for current calY/calM
  const calendar=(()=>{
    const first=new Date(calY,calM,1);
    const daysInMonth=new Date(calY,calM+1,0).getDate();
    // Monday = 0
    const startOffset=(first.getDay()+6)%7;
    const cells=[];
    for(let i=0;i<startOffset;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cells.push({d,ds,workouts:dateMap[ds]||[],isToday:ds===today(),isFuture:new Date(ds+'T23:59:59')>now});
    }
    while(cells.length%7!==0)cells.push(null);
    return cells;
  })();

  // Habit summary: last month avg workouts/week, current month so far
  const summary=(()=>{
    const lastMonth=new Date(now.getFullYear(),now.getMonth()-1,1);
    const lastY=lastMonth.getFullYear(),lastM=lastMonth.getMonth();
    const lastMonthName=lastMonth.toLocaleDateString('en-US',{month:'long'});
    const lastMonthWorkouts=workouts.filter(w=>{const d=new Date(w.date+'T12:00:00');return d.getFullYear()===lastY&&d.getMonth()===lastM;}).length;
    const daysInLastMonth=new Date(lastY,lastM+1,0).getDate();
    const lastAvgPerWeek=lastMonthWorkouts/(daysInLastMonth/7);
    const target=Math.max(1,Math.ceil(lastAvgPerWeek+1));
    // Current month
    const thisMonthCount=workouts.filter(w=>{const d=new Date(w.date+'T12:00:00');return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();}).length;
    const dayOfMonth=now.getDate();
    const thisAvgPerWeek=thisMonthCount/(dayOfMonth/7);
    return {lastMonthName,lastMonthWorkouts,lastAvgPerWeek,thisAvgPerWeek,target};
  })();

  const monthName=new Date(calY,calM,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const isCurrentMonthView=calY===now.getFullYear()&&calM===now.getMonth();
  function prevMonth(){const d=new Date(calY,calM-1,1);setCalY(d.getFullYear());setCalM(d.getMonth());setSelectedDay(null);}
  function nextMonth(){if(isCurrentMonthView)return;const d=new Date(calY,calM+1,1);setCalY(d.getFullYear());setCalM(d.getMonth());setSelectedDay(null);}
  function jumpToday(){setCalY(now.getFullYear());setCalM(now.getMonth());setSelectedDay(null);}

  const selWorkouts=selectedDay?dateMap[selectedDay]||[]:null;

  return <div style={{display:'flex',flexDirection:'column',gap:16}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
      {[{v:streak,l:'Streak',e:streak>=2?'🔥':''},{v:mo,l:'This month'},{v:workouts.length,l:'All time'}].map(({v,l,e})=><div key={l} style={{background:T.bgS,borderRadius:14,padding:'14px',textAlign:'center'}}>
        <p style={{fontSize:26,fontWeight:700,color:T.ac,fontFamily:T.serif}}>{v}{e}</p>
        <p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.txS,marginTop:2}}>{l}</p>
      </div>)}
    </div>

    {/* Habit summary */}
    <Card style={{padding:'16px',background:T.acS,boxShadow:'none'}}>
      <p style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.12em',color:T.ac,marginBottom:8}}>Habit Check-in</p>
      {summary.lastMonthWorkouts>0?<p style={{fontSize:14,color:T.tx,lineHeight:1.55}}>
        You completed <strong style={{fontWeight:700}}>{summary.lastAvgPerWeek.toFixed(1)} workouts per week</strong> on average in {summary.lastMonthName} ({summary.lastMonthWorkouts} total). Let's see if you can get to <strong style={{fontWeight:700,color:T.ac}}>{summary.target} this month</strong>!
      </p>:<p style={{fontSize:14,color:T.tx,lineHeight:1.55}}>
        No workouts logged in {summary.lastMonthName} yet. Aim for <strong style={{fontWeight:700,color:T.ac}}>3 this month</strong> to build the habit.
      </p>}
      {summary.thisAvgPerWeek>0&&<div style={{marginTop:12,display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1}}>
          <Bar value={summary.thisAvgPerWeek} max={summary.target} h={6}/>
        </div>
        <span style={{fontSize:12,fontWeight:700,color:T.ac,fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap'}}>{summary.thisAvgPerWeek.toFixed(1)} / {summary.target} per wk</span>
      </div>}
    </Card>

    {/* Calendar */}
    <Card style={{padding:'16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <button onClick={prevMonth} style={{background:T.bgS,border:'none',borderRadius:10,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.tx} strokeWidth="2.5"><polyline points="15,18 9,12 15,6"/></svg>
        </button>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:16,fontWeight:700,color:T.tx,fontFamily:T.serif,letterSpacing:'-0.01em'}}>{monthName}</p>
          {!isCurrentMonthView&&<button onClick={jumpToday} style={{fontSize:11,fontWeight:700,color:T.ac,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',marginTop:2,padding:0}}>Jump to today</button>}
        </div>
        <button onClick={nextMonth} disabled={isCurrentMonthView} style={{background:isCurrentMonthView?'transparent':T.bgS,border:'none',borderRadius:10,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:isCurrentMonthView?'default':'pointer',opacity:isCurrentMonthView?.3:1}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.tx} strokeWidth="2.5"><polyline points="9,18 15,12 9,6"/></svg>
        </button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:6}}>
        {['M','T','W','T','F','S','S'].map((d,i)=><div key={i} style={{textAlign:'center',fontSize:10,fontWeight:700,color:T.txS,letterSpacing:'0.06em'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
        {calendar.map((c,i)=>{
          if(!c)return <div key={i} style={{aspectRatio:'1'}}/>;
          const has=c.workouts.length>0;
          const primaryColor=has?catColor(c.workouts[0].type):null;
          const isSel=selectedDay===c.ds;
          return <button key={i} onClick={()=>setSelectedDay(s=>s===c.ds?null:c.ds)} style={{
            aspectRatio:'1',borderRadius:10,border:'none',cursor:'pointer',padding:0,fontFamily:'inherit',
            background:has?primaryColor:c.isFuture?'transparent':T.bgS,
            opacity:c.isFuture?.4:1,
            outline:c.isToday?`2px solid ${T.tx}`:isSel?`2px solid ${T.ac}`:'none',
            outlineOffset:-2,
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,
            position:'relative'
          }}>
            <span style={{fontSize:13,fontWeight:has?700:500,color:has?'#fff':c.isToday?T.tx:T.txM,lineHeight:1}}>{c.d}</span>
            {c.workouts.length>1&&<div style={{display:'flex',gap:2,marginTop:1}}>
              {c.workouts.slice(0,3).map((w,wi)=><div key={wi} style={{width:4,height:4,borderRadius:99,background:'#fff',opacity:.85}}/>)}
            </div>}
          </button>;
        })}
      </div>

      {selWorkouts&&selWorkouts.length>0&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.bgS}`,display:'flex',flexDirection:'column',gap:6}}>
        <p style={{fontSize:11,fontWeight:700,color:T.txS,textTransform:'uppercase',letterSpacing:'0.1em'}}>{fmtD(selectedDay)}</p>
        {selWorkouts.map(w=><div key={w.id} style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:8,height:8,borderRadius:99,background:catColor(w.type),flexShrink:0}}/>
          <span style={{flex:1,fontSize:13,fontWeight:600,color:T.tx}}>{catName(w.type)}</span>
          <span style={{fontSize:12,color:T.txS}}>{w.duration_minutes}min{w.notes?` · ${w.notes}`:''}</span>
        </div>)}
      </div>}
      {selectedDay&&(!selWorkouts||selWorkouts.length===0)&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.bgS}`}}>
        <p style={{fontSize:13,color:T.txS,textAlign:'center'}}>No workout on {fmtD(selectedDay)}</p>
      </div>}

      {/* Legend */}
      <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:14,paddingTop:14,borderTop:`1px solid ${T.bgS}`}}>
        {workoutCats.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:10,height:10,borderRadius:3,background:c.color}}/>
          <span style={{fontSize:11,fontWeight:600,color:T.txM}}>{c.name}</span>
        </div>)}
      </div>
    </Card>
    <div style={{display:'flex',gap:8}}>
      <Btn onClick={()=>setShow(v=>!v)} full v="ghost">+ Log Workout</Btn>
      <Btn onClick={()=>setShowCatMgr(v=>!v)} v="soft" size="sm">Categories</Btn>
    </div>
    {showCatMgr&&<Card style={{padding:'16px'}}>
      <SecLabel>Workout Categories</SecLabel>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
        {workoutCats.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',background:T.bgS,borderRadius:10}}>
          <div style={{width:18,height:18,borderRadius:5,background:c.color,flexShrink:0}}/>
          <input defaultValue={c.name} onBlur={e=>{const v=e.target.value.trim();if(v&&v!==c.name)updateCategory(c.id,{name:v});else e.target.value=c.name;}} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
            style={{flex:1,fontSize:14,fontWeight:600,color:T.tx,background:'transparent',border:'none',outline:'none',fontFamily:'inherit',padding:0}}/>
          <IconBtn onClick={()=>delCategory(c.id)} danger><TrashIcon/></IconBtn>
        </div>)}
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input value={newCat.name} onChange={e=>setNewCat({...newCat,name:e.target.value})} onKeyDown={e=>e.key==='Enter'&&addCategory()} placeholder="New category…"
          style={{flex:1,background:T.bgS,border:`2px solid transparent`,borderRadius:10,padding:'9px 12px',fontSize:14,color:T.tx,outline:'none',fontFamily:'inherit'}}/>
        <Btn onClick={addCategory} size="sm">Add</Btn>
      </div>
      <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
        {CAT_COLORS.map(col=><button key={col} onClick={()=>setNewCat({...newCat,color:col})} style={{width:24,height:24,borderRadius:6,background:col,border:newCat.color===col?`2px solid ${T.tx}`:'2px solid transparent',cursor:'pointer',padding:0}}/>)}
      </div>
    </Card>}
    {show&&<Card style={{padding:'16px'}}><div style={{display:'flex',flexDirection:'column',gap:12}}>
      <Inp label="Date" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
      <div>

      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <p style={{fontSize:16,fontWeight:700,color:T.tx}}>Edit Workout</p>
        <Inp label="Date" type="date" value={editW.date} onChange={e=>{const v=e.target.value;setEditW(s=>({...s,date:v}));updateWorkout(editW.id,{date:v});}}/>

          <label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.txS,marginBottom:8}}>Category</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {workoutCats.map(c=><button key={c.id} onClick={()=>{setEditW(s=>({...s,type:c.id}));updateWorkout(editW.id,{type:c.id});}} style={{padding:'8px 16px',borderRadius:10,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,fontFamily:'inherit',background:editW.type===c.id?c.color:T.bgS,color:editW.type===c.id?'#fff':T.txM}}>{c.name}</button>)}
          </div>
        </div>
        <Inp label="Duration (min)" type="number" value={editW.duration_minutes} onChange={e=>{const v=Number(e.target.value);setEditW(s=>({...s,duration_minutes:v}));updateWorkout(editW.id,{duration_minutes:v});}}/>
        <Inp label="Notes" value={editW.notes||''} onChange={e=>{const v=e.target.value;setEditW(s=>({...s,notes:v}));updateWorkout(editW.id,{notes:v});}}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Btn v="soft" onClick={()=>setEditW(null)}>Done</Btn>
          <Btn v="danger" onClick={()=>delWorkout(editW.id)}>Delete</Btn>
        </div>
      </div>
    </Sheet>}
  </div>;
}

function PFTTab({state,save}){
  const {pft,user}=state;
  const days=daysFrom('2026-06-15');
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({date:today(),pullups:'',plank_m:'',plank_s:'',run_m:'',run_s:''});
  function bracket(age){if(age<=25)return 0;if(age<=30)return 1;if(age<=35)return 2;if(age<=40)return 3;if(age<=45)return 4;if(age<=50)return 5;return 6;}
  const sex=user.sex||'female';
  const FP=sex==='male'?[[4,23],[4,23],[3,22],[3,21],[3,19],[3,17],[3,16]]:[[1,11],[1,10],[1,9],[1,8],[1,7],[1,6],[1,5]];
  const FK=sex==='male'?[[63,225],[63,225],[63,220],[63,215],[63,210],[63,205],[63,200]]:[[63,210],[63,205],[63,200],[63,195],[63,190],[63,185],[63,180]];
  const FR=sex==='male'?[[1080,1660],[1080,1660],[1140,1720],[1200,1780],[1260,1840],[1320,1900],[1380,1960]]:[[1260,1860],[1320,1920],[1380,1980],[1440,2040],[1500,2100],[1560,2160],[1620,2220]];
  const b=bracket(user.age);
  const sPU=r=>{const[lo,hi]=FP[b];if(r<lo)return 0;if(r>=hi)return 100;return Math.round(40+((r-lo)/(hi-lo))*60);};
  const sPL=s=>{const[lo,hi]=FK[b];if(s<lo)return 0;if(s>=hi)return 100;return Math.round(40+((s-lo)/(hi-lo))*60);};
  const sRN=s=>{const[f,sl]=FR[b];if(s<=f)return 100;if(s>sl)return 0;return Math.round(40+((sl-s)/(sl-f))*60);};
  function addEntry(){
    const ps=Number(form.plank_m)*60+Number(form.plank_s);const rs=Number(form.run_m)*60+Number(form.run_s);
    const e={id:uid(),date:form.date,pullups:Number(form.pullups),plank_s:ps,run_s:rs};
    save({...state,pft:[e,...state.pft]});setShow(false);
  }
  const latest=pft[0];
  const ls=latest?{p:sPU(latest.pullups),k:sPL(latest.plank_s),r:sRN(latest.run_s)}:null;
  const total=ls?ls.p+ls.k+ls.r:0;
  return <div style={{display:'flex',flexDirection:'column',gap:16}}>
    <Card style={{padding:'16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <p style={{fontSize:11,fontWeight:700,color:T.txS,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:4}}>PFT · Jan–Jun · {(user.sex||'female')==='male'?'Male':'Female'}</p>
          <p style={{fontSize:13,color:T.txM}}>Age <input type="number" value={user.age} onChange={e=>save({...state,user:{...user,age:Number(e.target.value)}})} style={{width:44,background:T.bgS,border:'none',borderRadius:8,padding:'3px 8px',fontSize:13,color:T.tx,outline:'none',textAlign:'center',fontFamily:'inherit'}}/> · {days}d to test</p>
        </div>
        {ls&&<div style={{textAlign:'right'}}><p style={{fontSize:38,fontWeight:700,fontFamily:T.serif,color:total>=240?T.g:total>=180?T.ac:T.w}}>{total}</p><p style={{fontSize:11,color:T.txS}}>/300</p></div>}
      </div>
      {ls&&<div style={{marginTop:12}}><ScoreBar label="Pull-ups" raw={`${latest.pullups} reps`} score={ls.p}/><ScoreBar label="Plank" raw={fmtSec(latest.plank_s)} score={ls.k}/><ScoreBar label="3-Mile Run" raw={fmtSec(latest.run_s)} score={ls.r}/></div>}
    </Card>
    <Btn onClick={()=>setShow(v=>!v)} full v="ghost">+ Log PFT</Btn>
    {show&&<Card style={{padding:'16px'}}><div style={{display:'flex',flexDirection:'column',gap:12}}>
      <Inp label="Date" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
      <Inp label="Pull-ups" type="number" placeholder="e.g. 8" value={form.pullups} onChange={e=>setForm({...form,pullups:e.target.value})}/>
      <div><label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.txS,marginBottom:6}}>Plank (min:sec)</label><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}><Inp placeholder="min" type="number" value={form.plank_m} onChange={e=>setForm({...form,plank_m:e.target.value})}/><Inp placeholder="sec" type="number" value={form.plank_s} onChange={e=>setForm({...form,plank_s:e.target.value})}/></div></div>
      <div><label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.txS,marginBottom:6}}>3-Mile Run (min:sec)</label><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}><Inp placeholder="min" type="number" value={form.run_m} onChange={e=>setForm({...form,run_m:e.target.value})}/><Inp placeholder="sec" type="number" value={form.run_s} onChange={e=>setForm({...form,run_s:e.target.value})}/></div></div>
      <Btn onClick={addEntry} full>Save</Btn>
    </div></Card>}
    {pft.length>1&&<div><SecLabel>History</SecLabel>
      {pft.map((e,i)=>{const s=sPU(e.pullups)+sPL(e.plank_s)+sRN(e.run_s);const prev=pft[i+1];const delta=prev?s-(sPU(prev.pullups)+sPL(prev.plank_s)+sRN(prev.run_s)):null;return <div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:`1px solid ${T.bgS}`}}>
        <div><p style={{fontSize:11,fontWeight:600,color:T.txS}}>{e.date}</p><p style={{fontSize:13,color:T.tx,marginTop:2}}>{e.pullups} reps · {fmtSec(e.plank_s)} · {fmtSec(e.run_s)}</p></div>
        <div style={{textAlign:'right'}}><p style={{fontSize:22,fontWeight:700,color:T.ac,fontFamily:T.serif}}>{s}</p>{delta!==null&&<p style={{fontSize:11,fontWeight:700,color:delta>=0?T.g:T.r}}>{delta>0?'+':''}{delta}</p>}</div>
      </div>;})}
    </div>}
  </div>;
}

/* ── BOOKS ───────────────────────────────────────────────── */
function BooksView({state,setState}){
  const {books,bookCategories}=state;
  const [tab,setTab]=useState('to_read');
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({title:'',author:'',categories:[],notes:''});
  const [filter,setFilter]=useState(null);
  const [editBook,setEditBook]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const dragItem=useRef(null);

  function save(n){setState(n);saveState(n);}
  function addBook(){
    if(!form.title.trim())return;
    const existing=books.filter(b=>b.status===tab);
    const b={id:uid(),...form,title:form.title.trim(),status:tab,rating:null,order:existing.length};
    save({...state,books:[...state.books,b]});setShowAdd(false);setForm({title:'',author:'',categories:[],notes:''});
  }
  function updateBook(id,fields){save({...state,books:state.books.map(b=>b.id===id?{...b,...fields}:b)});}
  function delBook(id){save({...state,books:state.books.filter(b=>b.id!==id)});setEditBook(null);}
  function toggleCat(c){setForm(f=>({...f,categories:f.categories.includes(c)?f.categories.filter(x=>x!==c):[...f.categories,c]}));}

  const list=books.filter(b=>b.status===tab).sort((a,b)=>(a.order??0)-(b.order??0));
  const filtered=filter?list.filter(b=>b.categories?.includes(filter)):list;

  // Drag to reorder
  function onDragStart(e,id){dragItem.current=id;e.dataTransfer.effectAllowed='move';}
  function onDragOver(e,id){e.preventDefault();setDragOver(id);}
  function onDrop(e,targetId){
    e.preventDefault();setDragOver(null);
    const fromId=dragItem.current;if(!fromId||fromId===targetId)return;
    const statusBooks=books.filter(b=>b.status===tab).sort((a,b)=>(a.order??0)-(b.order??0));
    const fromIdx=statusBooks.findIndex(b=>b.id===fromId);
    const toIdx=statusBooks.findIndex(b=>b.id===targetId);
    if(fromIdx<0||toIdx<0)return;
    const reordered=[...statusBooks];const[moved]=reordered.splice(fromIdx,1);reordered.splice(toIdx,0,moved);
    const updatedOrders=reordered.map((b,i)=>({...b,order:i}));
    const otherBooks=books.filter(b=>b.status!==tab);
    save({...state,books:[...otherBooks,...updatedOrders]});
  }

  return <div style={{display:'flex',flexDirection:'column',gap:16}} className="slide-up">
    <PageTitle>Books</PageTitle>
    <TabBar tabs={[['to_read',`To Read (${books.filter(b=>b.status==='to_read').length})`],['read',`Read (${books.filter(b=>b.status==='read').length})`]]} active={tab} onChange={k=>{setTab(k);setFilter(null);}}/>
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      <Pill label="All" active={!filter} onClick={()=>setFilter(null)}/>
      {bookCategories.map(c=><Pill key={c} label={c} count={list.filter(b=>b.categories?.includes(c)).length} active={filter===c} onClick={()=>setFilter(filter===c?null:c)}/>)}
    </div>
    <Btn onClick={()=>setShowAdd(v=>!v)} full v="ghost">+ Add Book</Btn>
    {showAdd&&<Card style={{padding:'16px'}}><div style={{display:'flex',flexDirection:'column',gap:12}}>
      <Inp label="Title" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
      <Inp label="Author" value={form.author} onChange={e=>setForm({...form,author:e.target.value})}/>
      <div>
        <label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.txS,marginBottom:8}}>Tags</label>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{bookCategories.map(c=><Pill key={c} label={c} active={form.categories.includes(c)} onClick={()=>toggleCat(c)}/>)}</div>
      </div>
      <Btn onClick={addBook} full>Save</Btn>
    </div></Card>}
    {tab==='to_read'&&filtered.length>1&&<p style={{fontSize:11,color:T.txS,textAlign:'center'}}>✦ Drag to reorder priority</p>}
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {filtered.length===0&&<Empty icon="📚" text={tab==='to_read'?'Reading list is empty':'No books read yet'}/>}
      {filtered.map((b,i)=>{
        const isDragOver=dragOver===b.id;
        return <Card key={b.id}
          draggable={tab==='to_read'}
          onDragStart={e=>onDragStart(e,b.id)}
          onDragOver={e=>onDragOver(e,b.id)}
          onDrop={e=>onDrop(e,b.id)}
          onDragLeave={()=>setDragOver(null)}
          style={{padding:'14px',opacity:isDragOver?.6:1,border:isDragOver?`2px dashed ${T.ac}`:'2px solid transparent',transition:'all .15s'}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
            {tab==='to_read'&&<div style={{flexShrink:0,cursor:'grab',color:T.txS,paddingTop:3,fontSize:16}}>⠿</div>}
            <div style={{flex:1,minWidth:0}} onClick={()=>setEditBook(b)}>
              <input defaultValue={b.title} onBlur={e=>updateBook(b.id,{title:e.target.value})} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
                style={{fontSize:15,fontWeight:700,color:T.tx,background:'transparent',border:'none',outline:'none',width:'100%',fontFamily:'inherit'}}/>
              {b.author&&<p style={{fontSize:13,color:T.txM,marginTop:2}}>{b.author}</p>}
              {b.categories?.length>0&&<div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>{b.categories.map(c=><Chip key={c} label={c}/>)}</div>}
              {tab==='read'&&<Stars rating={b.rating} onRate={r=>updateBook(b.id,{rating:r})}/>}
            </div>
            <IconBtn onClick={()=>delBook(b.id)} danger><TrashIcon/></IconBtn>
          </div>
        </Card>;
      })}
    </div>
    {editBook&&<Sheet onClose={()=>setEditBook(null)}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <p style={{fontSize:16,fontWeight:700,color:T.tx}}>Edit Book</p>
        <Inp label="Title" value={editBook.title} onChange={e=>{const v=e.target.value;setEditBook(s=>({...s,title:v}));updateBook(editBook.id,{title:v});}}/>
        <Inp label="Author" value={editBook.author||''} onChange={e=>{const v=e.target.value;setEditBook(s=>({...s,author:v}));updateBook(editBook.id,{author:v});}}/>
        {editBook.status==='read'&&<div><SecLabel>Rating</SecLabel><Stars rating={editBook.rating} onRate={r=>{setEditBook(s=>({...s,rating:r}));updateBook(editBook.id,{rating:r});}}/></div>}
        <Btn v="danger" onClick={()=>delBook(editBook.id)}>Delete Book</Btn>
      </div>
    </Sheet>}
  </div>;
}

/* ── REFERENCE ───────────────────────────────────────────── */
function ReferenceView({state,setState}){
  const {reference}=state;
  const [tab,setTab]=useState('documents');
  const [revealed,setRevealed]=useState(new Set());
  const [editing,setEditing]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({label:'',fields:[{k:'',v:'',sensitive:false}]});
  function save(n){setState(n);saveState(n);}
  function addItem(){
    if(!form.label.trim())return;
    const item={id:uid(),category:tab,label:form.label.trim(),fields:form.fields.filter(f=>f.k.trim()||f.v.trim())};
    save({...state,reference:[...reference,item]});
    setShowAdd(false);setForm({label:'',fields:[{k:'',v:'',sensitive:false}]});
  }
  function delItem(id){save({...state,reference:reference.filter(r=>r.id!==id)});setEditing(null);}
  function updateItem(id,fields){save({...state,reference:reference.map(r=>r.id===id?{...r,...fields}:r)});}
  function toggleReveal(id){setRevealed(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function copyVal(v){try{navigator.clipboard.writeText(v);}catch(e){}}

  const items=reference.filter(r=>r.category===tab);
  const TABS=[['documents','Documents'],['memberships','Memberships'],['emergency','Emergency'],['other','Other']];

  return <div style={{display:'flex',flexDirection:'column',gap:16}} className="slide-up">
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
      <div>
        <PageTitle>Reference</PageTitle>
        <p style={{fontSize:12,color:T.txS,marginTop:-12,marginBottom:0,display:'flex',alignItems:'center',gap:6}}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Numbers and IDs you reach for. Hidden by default.
        </p>
      </div>
    </div>

    <TabBar tabs={TABS} active={tab} onChange={k=>{setTab(k);setShowAdd(false);}}/>

    <Btn onClick={()=>setShowAdd(v=>!v)} full v="ghost">+ Add {TABS.find(t=>t[0]===tab)[1].toLowerCase().replace(/s$/,'')}</Btn>

    {showAdd&&<Card style={{padding:'16px'}}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Inp label="Label" placeholder={tab==='documents'?'e.g. Passport':tab==='memberships'?'e.g. Delta SkyMiles':'e.g. Mom'} value={form.label} onChange={e=>setForm({...form,label:e.target.value})}/>
        <div>
          <label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:T.txS,marginBottom:8}}>Fields</label>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {form.fields.map((f,i)=><div key={i} style={{display:'flex',gap:6,alignItems:'center'}}>
              <input value={f.k} onChange={e=>{const arr=[...form.fields];arr[i]={...arr[i],k:e.target.value};setForm({...form,fields:arr});}} placeholder="Field"
                style={{flex:1,background:T.bgS,border:'2px solid transparent',borderRadius:10,padding:'9px 12px',fontSize:14,color:T.tx,outline:'none',fontFamily:'inherit',minWidth:0}}/>
              <input value={f.v} onChange={e=>{const arr=[...form.fields];arr[i]={...arr[i],v:e.target.value};setForm({...form,fields:arr});}} placeholder="Value"
                style={{flex:1.4,background:T.bgS,border:'2px solid transparent',borderRadius:10,padding:'9px 12px',fontSize:14,color:T.tx,outline:'none',fontFamily:'inherit',minWidth:0}}/>
              <button onClick={()=>{const arr=[...form.fields];arr[i]={...arr[i],sensitive:!arr[i].sensitive};setForm({...form,fields:arr});}} title={f.sensitive?'Sensitive':'Plain'}
                style={{width:32,height:32,background:f.sensitive?T.acS:T.bgS,border:'none',borderRadius:8,cursor:'pointer',color:f.sensitive?T.ac:T.txS,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </button>
            </div>)}
          </div>
          <button onClick={()=>setForm({...form,fields:[...form.fields,{k:'',v:'',sensitive:false}]})} style={{marginTop:8,fontSize:12,fontWeight:700,color:T.ac,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',padding:0}}>+ Add field</button>
        </div>
        <Btn onClick={addItem} full>Save</Btn>
      </div>
    </Card>}

    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {items.length===0&&<Empty icon="🗂" text={`No ${TABS.find(t=>t[0]===tab)[1].toLowerCase()} yet`}/>}
      {items.map(item=>{
        const isRev=revealed.has(item.id);
        return <Card key={item.id} style={{padding:'14px 16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <input defaultValue={item.label} onBlur={e=>{const v=e.target.value.trim();if(v&&v!==item.label)updateItem(item.id,{label:v});else e.target.value=item.label;}} onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
              style={{flex:1,fontSize:15,fontWeight:700,color:T.tx,background:'transparent',border:'none',outline:'none',fontFamily:'inherit',fontFamily:T.serif}}/>
            <button onClick={()=>toggleReveal(item.id)} style={{background:T.bgS,border:'none',borderRadius:8,padding:'4px 10px',fontSize:11,fontWeight:700,color:T.txM,cursor:'pointer',fontFamily:'inherit'}}>
              {isRev?'Hide':'Reveal'}
            </button>
            <IconBtn onClick={()=>{if(window.confirm('Delete this entry?'))delItem(item.id);}} danger><TrashIcon/></IconBtn>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {item.fields.map((f,i)=>{
              const sens=f.sensitive;
              const display=sens&&!isRev?(f.v||'').replace(/./g,'•').slice(0,14):f.v;
              return <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'4px 0'}}>
                <span style={{fontSize:11,fontWeight:700,color:T.txS,textTransform:'uppercase',letterSpacing:'0.06em',width:80,flexShrink:0}}>{f.k}</span>
                <span style={{flex:1,fontSize:14,color:T.tx,fontVariantNumeric:'tabular-nums',fontFamily:sens?'ui-monospace,SFMono-Regular,Menlo,monospace':'inherit'}}>{display||'—'}</span>
                {sens&&isRev&&<button onClick={()=>copyVal(f.v)} style={{background:'none',border:'none',cursor:'pointer',color:T.ac,fontSize:11,fontWeight:700,fontFamily:'inherit',padding:'2px 6px'}}>Copy</button>}
              </div>;
            })}
          </div>
        </Card>;
      })}
    </div>
  </div>;
}

/* ── SEARCH PALETTE ──────────────────────────────────────── */
function SearchPalette({state,onGo,onClose,onAddTask}){
  const [q,setQ]=useState('');
  const Q=q.trim().toLowerCase();
  const inputRef=useRef(null);
  useEffect(()=>{inputRef.current?.focus();},[]);

  const tasks=Q?state.tasks.filter(t=>t.status==='todo'&&t.title.toLowerCase().includes(Q)).slice(0,6):[];
  const projects=Q?state.projects.filter(p=>p.title.toLowerCase().includes(Q)||(p.notes||'').toLowerCase().includes(Q)).slice(0,4):[];
  const trips=Q?state.trips.filter(t=>t.destination.toLowerCase().includes(Q)).slice(0,3):[];
  const books=Q?state.books.filter(b=>b.title.toLowerCase().includes(Q)||(b.author||'').toLowerCase().includes(Q)).slice(0,4):[];
  const clothing=Q?state.clothing.filter(c=>c.title.toLowerCase().includes(Q)).slice(0,3):[];
  const empty=Q&&tasks.length===0&&projects.length===0&&trips.length===0&&books.length===0&&clothing.length===0;

  function onKey(e){
    if(e.key==='Enter'&&Q&&tasks.length===0&&projects.length===0&&trips.length===0&&books.length===0&&clothing.length===0){
      onAddTask(q);onClose();
    }
    if(e.key==='Escape')onClose();
  }

  return <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:500,background:'rgba(20,20,25,0.55)',display:'flex',flexDirection:'column',padding:'40px 16px 16px',paddingTop:'calc(40px + env(safe-area-inset-top,0px))'}}>

      <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',borderBottom:`1px solid ${T.bgS}`}}>
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke={T.txS} strokeWidth="1.8"/><path d="M11 11L14 14" stroke={T.txS} strokeWidth="1.8" strokeLinecap="round"/></svg>
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={onKey} placeholder="Search tasks, projects, trips, books…" style={{flex:1,border:'none',outline:'none',fontSize:16,fontFamily:'inherit',background:'transparent',color:T.tx}}/>
        <button onClick={onClose} style={{background:T.bgS,border:'none',cursor:'pointer',padding:'4px 8px',color:T.txM,fontSize:11,fontWeight:700,borderRadius:6,fontFamily:'inherit'}}>ESC</button>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        {Q&&<div onClick={()=>{onAddTask(q);onClose();}} style={{padding:'12px 16px',background:T.acS,display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}>

          <span style={{flex:1,fontSize:14,fontWeight:600,color:T.tx}}>Add task <span style={{color:T.txM,fontWeight:500}}>"{q}"</span></span>

        {tasks.length>0&&<>

            <div style={{flex:1}}>
              <p style={{fontSize:14,fontWeight:600,color:T.tx}}>{b.title}</p>

            <span style={{fontSize:14,color:T.txM,width:18,textAlign:'center'}}>◈</span>
            <div style={{flex:1}}>
              <p style={{fontSize:14,fontWeight:600,color:T.tx}}>{c.title}</p>
              <p style={{fontSize:11,color:T.txS,marginTop:1,textTransform:'capitalize'}}>{c.type.replace(/_/g,' ')}</p>
            </div>
          </div>)}
        </>}

        {empty&&<p style={{fontSize:13,color:T.txS,textAlign:'center',padding:'24px 20px'}}>No matches. Press ⏎ to add as a task.</p>}
        {!Q&&<p style={{fontSize:13,color:T.txS,textAlign:'center',padding:'28px 20px'}}>Search across tasks, projects, trips, books, and clothing.</p>}
        <div style={{height:8}}/>
      </div>
    </div>
  </div>;
}

/* ── SETTINGS ────────────────────────────────────────────── */
function SettingsView({state,setState}){
  function save(n){setState(n);saveState(n);}
  function exportData(){
    const data=JSON.stringify(state,null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`lifeos-backup-${today()}.json`;document.body.appendChild(a);a.click();a.remove();
    URL.revokeObjectURL(url);
  }
  function importData(){
    const input=document.createElement('input');input.type='file';input.accept='.json,application/json';
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(window.confirm('Replace ALL current data with this backup? This cannot be undone.')){save(data);}}catch(err){alert('Invalid backup file.');}};
      reader.readAsText(file);
    };
    input.click();
  }
  function resetAll(){
    if(window.confirm('Reset everything? This erases all your tasks, projects, trips, books, and clothing.')){
      localStorage.removeItem('lifeos_v5');
      window.location.reload();
    }
  }
  const sex=state.user.sex||'female';
  const abEvent=state.user.abEvent||'plank';
  const initial=(state.user.name||'Y').trim().charAt(0).toUpperCase()||'Y';

  return <div style={{display:'flex',flexDirection:'column',gap:14}} className="slide-up">
    <PageTitle>Settings</PageTitle>

    <Card style={{padding:'16px'}}>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:56,height:56,borderRadius:28,background:T.ac,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:22,fontFamily:T.serif,fontWeight:700,flexShrink:0}}>{initial}</div>
        <div style={{flex:1}}>
          <input defaultValue={state.user.name||''} placeholder="Your name" onBlur={e=>save({...state,user:{...state.user,name:e.target.value}})} onKeyDown={e=>e.key==='Enter'&&e.target.blur()} style={{fontSize:16,fontWeight:700,color:T.tx,background:'transparent',border:'none',outline:'none',fontFamily:'inherit',width:'100%'}}/>
          <p style={{fontSize:11,color:T.txS,marginTop:2}}>Shown on Today screen</p>
        </div>
      </div>
    </Card>

    <SecLabel>FITNESS PROFILE</SecLabel>
    <Card style={{padding:0}}>
      <div style={{padding:'14px 16px',borderBottom:`1px solid ${T.bgS}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:14,fontWeight:500,color:T.tx}}>Age</span>
        <input type="number" value={state.user.age} onChange={e=>save({...state,user:{...state.user,age:Number(e.target.value)}})} style={{width:64,background:T.bgS,border:'none',borderRadius:8,padding:'6px 10px',fontSize:14,color:T.tx,outline:'none',textAlign:'center',fontFamily:'inherit',fontWeight:600}}/>
      </div>
      <div style={{padding:'14px 16px',borderBottom:`1px solid ${T.bgS}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
          <span style={{fontSize:14,fontWeight:500,color:T.tx}}>Sex</span>
          <span style={{fontSize:11,color:T.txS}}>for PFT/CFT scoring</span>
        </div>
        <div style={{display:'flex',gap:6,padding:3,background:T.bgS,borderRadius:10}}>
          {['female','male'].map(g=><button key={g} onClick={()=>save({...state,user:{...state.user,sex:g}})} style={{flex:1,fontSize:13,fontWeight:700,padding:'8px',border:'none',borderRadius:8,cursor:'pointer',fontFamily:'inherit',background:sex===g?T.card:'transparent',color:sex===g?T.ac:T.txM,boxShadow:sex===g?'0 1px 3px rgba(0,0,0,0.07)':'none',textTransform:'capitalize'}}>{g}</button>)}
        </div>
      </div>
      <div style={{padding:'14px 16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
          <span style={{fontSize:14,fontWeight:500,color:T.tx}}>Abdominal event</span>
          <span style={{fontSize:11,color:T.txS}}>PFT</span>
        </div>
        <div style={{display:'flex',gap:6,padding:3,background:T.bgS,borderRadius:10}}>
          {[['plank','Plank'],['crunches','Crunches']].map(([v,l])=><button key={v} onClick={()=>save({...state,user:{...state.user,abEvent:v}})} style={{flex:1,fontSize:13,fontWeight:700,padding:'8px',border:'none',borderRadius:8,cursor:'pointer',fontFamily:'inherit',background:abEvent===v?T.card:'transparent',color:abEvent===v?T.ac:T.txM,boxShadow:abEvent===v?'0 1px 3px rgba(0,0,0,0.07)':'none'}}>{l}</button>)}
        </div>
      </div>
    </Card>

    <SecLabel>CLOUD SYNC</SecLabel>
    <Card style={{padding:'16px'}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
        <div style={{width:36,height:36,borderRadius:10,background:T.bgS,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18}}>☁</div>
        <div style={{flex:1}}>
          <p style={{fontSize:14,fontWeight:700,color:T.tx}}>Not connected · local only</p>
          <p style={{fontSize:12,color:T.txM,marginTop:4,lineHeight:1.5}}>Your data lives in this device's browser. To use LifeOS on phone + web, connect a Supabase project. The schema is in <strong style={{color:T.tx,fontWeight:700}}>/docs/supabase.sql</strong>.</p>
        </div>
      </div>
      <div style={{marginTop:12,padding:'10px 12px',background:T.bgS,borderRadius:10}}>
        <p style={{fontSize:11,fontWeight:700,color:T.txS,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>Setup</p>
        <ol style={{fontSize:12,color:T.txM,paddingLeft:18,lineHeight:1.7,margin:0}}>
          <li>Create a new Supabase project</li>
          <li>Run <code style={{background:T.card,padding:'1px 5px',borderRadius:4,fontSize:11}}>docs/supabase.sql</code> in the SQL editor</li>
          <li>Paste your URL + anon key below</li>
          <li>Enable Row-Level Security policies (in schema)</li>
        </ol>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:12}}>
        <Inp label="Supabase URL" placeholder="https://xxxxx.supabase.co" disabled/>
        <Inp label="Anon key" placeholder="eyJ…" disabled/>
        <Btn full disabled>Connect (coming soon)</Btn>
      </div>
    </Card>

    <SecLabel>DATA</SecLabel>
    <Card style={{padding:0}}>
      <button onClick={exportData} style={{width:'100%',padding:'14px 16px',background:'none',border:'none',borderBottom:`1px solid ${T.bgS}`,textAlign:'left',cursor:'pointer',fontFamily:'inherit'}}>
        <p style={{fontSize:14,fontWeight:500,color:T.tx}}>Export all data</p>
        <p style={{fontSize:11,color:T.txS,marginTop:2}}>Download a JSON backup</p>
      </button>
      <button onClick={importData} style={{width:'100%',padding:'14px 16px',background:'none',border:'none',borderBottom:`1px solid ${T.bgS}`,textAlign:'left',cursor:'pointer',fontFamily:'inherit'}}>
        <p style={{fontSize:14,fontWeight:500,color:T.tx}}>Import from backup</p>
        <p style={{fontSize:11,color:T.txS,marginTop:2}}>Replace current data from a .json file</p>
      </button>
      <button onClick={resetAll} style={{width:'100%',padding:'14px 16px',background:'none',border:'none',textAlign:'left',cursor:'pointer',fontFamily:'inherit'}}>
        <p style={{fontSize:14,fontWeight:500,color:T.r}}>Reset everything</p>
        <p style={{fontSize:11,color:T.txS,marginTop:2}}>Erase all data and start fresh</p>
      </button>
    </Card>

    <p style={{fontSize:10,color:T.txS,textAlign:'center',marginTop:8}}>LifeOS · v1.1</p>
  </div>;
}

/* ── NAVIGATION ──────────────────────────────────────────── */
const StyleIcon=()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"><path d="M8.5 3 L4 6 L6 10 L8.5 9 V21 H15.5 V9 L18 10 L20 6 L15.5 3 L14 5 H10 Z"/></svg>;
const FitnessIcon=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2.5" y="9.5" width="2.2" height="5" rx="0.8"/><rect x="5.2" y="7.5" width="2.2" height="9" rx="0.8"/><line x1="7.4" y1="12" x2="16.6" y2="12"/><rect x="16.6" y="7.5" width="2.2" height="9" rx="0.8"/><rect x="19.3" y="9.5" width="2.2" height="5" rx="0.8"/></svg>;
const ReferenceIcon=()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>;
const NAV=[
  {id:'today',label:'Today',icon:'⊙'},
  {id:'tasks',label:'Tasks',icon:'✓'},
  {id:'projects',label:'Projects',icon:'◫'},
  {id:'trips',label:'Trips',icon:'✈'},
  {id:'clothing',label:'Style',icon:<StyleIcon/>},
  {id:'fitness',label:'Fitness',icon:<FitnessIcon/>},
  {id:'books',label:'Books',icon:'▤'},
  {id:'reference',label:'Reference',icon:<ReferenceIcon/>},
];

/* ── APP ROOT ─────────────────────────────────────────────── */
function App(){
  const [state,setState]=useState(()=>loadState());
  const [view,setView]=useState('today');
  const [moreOpen,setMoreOpen]=useState(false);
  const [searchOpen,setSearchOpen]=useState(false);

  // Cmd/Ctrl+K to open search on desktop
  useEffect(()=>{
    function onKey(e){
      if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setSearchOpen(true);}
    }
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);

  function quickAddTask(title){
    const t={id:uid(),title:title.trim(),context:state.categories[0]||'anywhere',priority:2,due_date:null,status:'todo',project_id:null};
    const n={...state,tasks:[t,...state.tasks]};
    setState(n);saveState(n);
    setView('tasks');
  }

  const mainNav=NAV.slice(0,5);
  const moreNav=NAV.slice(5);
  const activeInMore=moreNav.some(n=>n.id===view);

  function renderView(){
    switch(view){
      case 'today': return <TodayView state={state} setState={setState} go={v=>{setView(v);setMoreOpen(false);}}/>;
      case 'tasks': return <TasksView state={state} setState={setState}/>;
      case 'projects': return <ProjectsView state={state} setState={setState}/>;
      case 'trips': return <TripsView state={state} setState={setState}/>;
      case 'clothing': return <ClothingView state={state} setState={setState}/>;
      case 'fitness': return <FitnessView state={state} setState={setState}/>;
      case 'books': return <BooksView state={state} setState={setState}/>;
      case 'reference': return <ReferenceView state={state} setState={setState}/>;
      case 'settings': return <SettingsView state={state} setState={setState}/>;
      default: return null;
    }
  }

  return <div style={{display:'flex',flexDirection:'column',height:'100%',background:T.bg,maxWidth:430,margin:'0 auto',position:'relative',overflow:'hidden'}}>
    {/* Content */}
    <div style={{flex:1,overflowY:'auto',padding:'0 20px 100px',paddingTop:'calc(16px + env(safe-area-inset-top,0px))'}}>
      {renderView()}
    </div>

    {/* Bottom nav */}
    <div style={{position:'absolute',bottom:0,left:0,right:0,background:T.card,borderTop:`1px solid ${T.border}`,paddingBottom:'env(safe-area-inset-bottom,0px)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)'}}>
      <div style={{display:'flex'}}>
        {mainNav.map(n=>{const active=view===n.id;return <button key={n.id} onClick={()=>{setView(n.id);setMoreOpen(false);}} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 0 8px',gap:3,background:'none',border:'none',cursor:'pointer',position:'relative'}}>
          {active&&<div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:20,height:3,borderRadius:99,background:T.ac}}/>}
          <span style={{fontSize:16,lineHeight:1,color:active?T.ac:T.txS}}>{n.icon}</span>
          <span style={{fontSize:10,fontWeight:700,color:active?T.ac:T.txS,letterSpacing:'0.01em'}}>{n.label}</span>
        </button>;})}
        <button onClick={()=>setMoreOpen(v=>!v)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 0 8px',gap:3,background:'none',border:'none',cursor:'pointer',position:'relative'}}>
          {activeInMore&&<div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:20,height:3,borderRadius:99,background:T.ac}}/>}
          <span style={{fontSize:16,lineHeight:1,color:activeInMore?T.ac:T.txS}}>···</span>
          <span style={{fontSize:10,fontWeight:700,color:activeInMore?T.ac:T.txS}}>More</span>
        </button>
      </div>
    </div>

    {/* More sheet */}
    {moreOpen&&<div onClick={()=>setMoreOpen(false)} style={{position:'absolute',inset:0,zIndex:100,background:'rgba(0,0,0,0.4)'}}>
      <div onClick={e=>e.stopPropagation()} style={{position:'absolute',bottom:0,left:0,right:0,background:T.card,borderRadius:'24px 24px 0 0',padding:'20px 20px 40px',paddingBottom:'calc(40px + env(safe-area-inset-bottom,0px))'}}>
        <div style={{width:36,height:4,borderRadius:99,background:T.border,margin:'0 auto 20px'}}/>
        {[...moreNav,{id:'settings',label:'Settings',icon:'⚙'}].map(n=>{const active=view===n.id;return <button key={n.id} onClick={()=>{setView(n.id);setMoreOpen(false);}} style={{width:'100%',display:'flex',alignItems:'center',gap:16,padding:'14px 16px',borderRadius:14,border:'none',cursor:'pointer',background:active?T.acS:'transparent',marginBottom:4}}>
          <span style={{fontSize:22,width:28,textAlign:'center',color:active?T.ac:T.txM}}>{n.icon}</span>
          <span style={{fontSize:16,fontWeight:600,color:active?T.ac:T.tx}}>{n.label}</span>
        </button>;})}
      </div>
    </div>}
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
